name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: write

env:
  FPC_VERSION: "3.2.2"

jobs:
  toolchain:
    uses: ./.github/workflows/toolchain.yml

  build:
    needs: toolchain
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore cross-compilers
        uses: actions/cache/restore@v4
        with:
          path: |
            fpcup-install
            cross-binutils
          key: ${{ needs.toolchain.outputs.cache-key }}

      - name: Configure cross-compiler paths
        run: |
          echo "$PWD/fpcup-install/fpc/bin" >> $GITHUB_PATH
          echo "$PWD/cross-binutils/bin" >> $GITHUB_PATH

      - name: Check formatting
        run: ./format.pas --check

      # --- macos-arm64 (native) ---
      - name: Build — macos-arm64
        run: ./build.pas clean --prod

      - name: Stage — macos-arm64
        run: |
          mkdir -p dist/macos-arm64
          for f in ScriptLoader REPL TestRunner BenchmarkRunner; do
            [ -f "build/$f" ] && cp "build/$f" dist/macos-arm64/
          done
          for f in build/Goccia.*.Test; do [ -f "$f" ] && cp "$f" dist/macos-arm64/; done

      # --- macos-x64 ---
      - name: Build — macos-x64
        env:
          FPC_TARGET_CPU: x86_64
          FPC_TARGET_OS: darwin
        run: ./build.pas clean --prod

      - name: Stage — macos-x64
        run: |
          mkdir -p dist/macos-x64
          for f in ScriptLoader REPL TestRunner BenchmarkRunner; do
            [ -f "build/$f" ] && cp "build/$f" dist/macos-x64/
          done
          for f in build/Goccia.*.Test; do [ -f "$f" ] && cp "$f" dist/macos-x64/; done

      # --- linux-x64 ---
      - name: Build — linux-x64
        env:
          FPC_TARGET_CPU: x86_64
          FPC_TARGET_OS: linux
          FPC_CROSS_PREFIX: x86_64-linux-
        run: ./build.pas clean --prod

      - name: Stage — linux-x64
        run: |
          mkdir -p dist/linux-x64
          for f in ScriptLoader REPL TestRunner BenchmarkRunner; do
            [ -f "build/$f" ] && cp "build/$f" dist/linux-x64/
          done
          for f in build/Goccia.*.Test; do [ -f "$f" ] && cp "$f" dist/linux-x64/; done

      # --- linux-arm64 ---
      - name: Build — linux-arm64
        env:
          FPC_TARGET_CPU: aarch64
          FPC_TARGET_OS: linux
          FPC_CROSS_PREFIX: aarch64-linux-
        run: ./build.pas clean --prod

      - name: Stage — linux-arm64
        run: |
          mkdir -p dist/linux-arm64
          for f in ScriptLoader REPL TestRunner BenchmarkRunner; do
            [ -f "build/$f" ] && cp "build/$f" dist/linux-arm64/
          done
          for f in build/Goccia.*.Test; do [ -f "$f" ] && cp "$f" dist/linux-arm64/; done

      # --- win-x64 ---
      - name: Build — win-x64
        env:
          FPC_TARGET_CPU: x86_64
          FPC_TARGET_OS: win64
        run: ./build.pas clean --prod

      - name: Stage — win-x64
        run: |
          mkdir -p dist/win-x64
          for f in ScriptLoader REPL TestRunner BenchmarkRunner; do
            [ -f "build/${f}.exe" ] && cp "build/${f}.exe" dist/win-x64/
          done
          for f in build/Goccia.*.Test.exe; do [ -f "$f" ] && cp "$f" dist/win-x64/; done

      # --- win-x86 ---
      - name: Build — win-x86
        env:
          FPC_TARGET_CPU: i386
          FPC_TARGET_OS: win32
        run: ./build.pas clean --prod

      - name: Stage — win-x86
        run: |
          mkdir -p dist/win-x86
          for f in ScriptLoader REPL TestRunner BenchmarkRunner; do
            [ -f "build/${f}.exe" ] && cp "build/${f}.exe" dist/win-x86/
          done
          for f in build/Goccia.*.Test.exe; do [ -f "$f" ] && cp "$f" dist/win-x86/; done

      # --- Upload artifacts ---
      - name: Upload — macos-arm64
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-arm64
          retention-days: 1
          path: dist/macos-arm64/

      - name: Upload — macos-x64
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-x64
          retention-days: 1
          path: dist/macos-x64/

      - name: Upload — linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-x64
          retention-days: 1
          path: dist/linux-x64/

      - name: Upload — linux-arm64
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-arm64
          retention-days: 1
          path: dist/linux-arm64/

      - name: Upload — win-x64
        uses: actions/upload-artifact@v4
        with:
          name: build-win-x64
          retention-days: 1
          path: dist/win-x64/

      - name: Upload — win-x86
        uses: actions/upload-artifact@v4
        with:
          name: build-win-x86
          retention-days: 1
          path: dist/win-x86/

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-latest
          - platform: macos-x64
            runner: macos-latest
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: win-x64
            runner: windows-latest
          - platform: win-x86
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Run all JavaScript tests (interpreted)
        run: ./build/TestRunner tests --silent --no-progress --output=test-results-interpreted.json

      - name: Run all JavaScript tests (bytecode)
        run: ./build/TestRunner tests --mode=bytecode --silent --no-progress --output=test-results-bytecode.json

      - name: Run Pascal unit tests
        run: |
          ./build/Goccia.Values.Primitives.Test
          ./build/Goccia.Values.FunctionValue.Test
          ./build/Goccia.Values.ObjectValue.Test
          ./build/Goccia.Compiler.Test
          ./build/Goccia.Builtins.TestAssertions.Test

  wasm-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-latest
          - platform: macos-x64
            runner: macos-latest
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: win-x64
            runner: windows-latest
          - platform: win-x86
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run WASM integration tests
        run: node ./tests-wasm/run-wasm-tests.mjs

  benchmark:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-latest
            mode: interpreted
          - platform: macos-arm64
            runner: macos-latest
            mode: bytecode
          - platform: macos-x64
            runner: macos-latest
            mode: interpreted
          - platform: macos-x64
            runner: macos-latest
            mode: bytecode
          - platform: linux-x64
            runner: ubuntu-latest
            mode: interpreted
          - platform: linux-x64
            runner: ubuntu-latest
            mode: bytecode
          - platform: win-x64
            runner: windows-latest
            mode: interpreted
          - platform: win-x64
            runner: windows-latest
            mode: bytecode
          - platform: win-x86
            runner: windows-latest
            mode: interpreted
          - platform: win-x86
            runner: windows-latest
            mode: bytecode
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Run benchmarks
        if: "!(github.ref == 'refs/heads/main' && matrix.platform == 'linux-x64')"
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: ./build/BenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress

      - name: Run benchmarks and save baseline
        if: github.ref == 'refs/heads/main' && matrix.platform == 'linux-x64'
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: ./build/BenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress --format=console --format=json --output=benchmark-${{ matrix.mode }}-results.json

      - name: Cache benchmark baseline
        if: github.ref == 'refs/heads/main' && matrix.platform == 'linux-x64'
        uses: actions/cache/save@v4
        with:
          path: benchmark-${{ matrix.mode }}-results.json
          key: benchmark-${{ matrix.mode }}-baseline-${{ github.sha }}

  examples:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-latest
          - platform: macos-x64
            runner: macos-latest
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: win-x64
            runner: windows-latest
          - platform: win-x86
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Run example scripts
        run: ./build/ScriptLoader examples

  artifacts:
    needs: [test, wasm-test, benchmark, examples]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        platform: [macos-arm64, macos-x64, linux-x64, linux-arm64, win-x64, win-x86]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: build/

      - name: Remove test binaries
        run: rm -f build/Goccia.*.Test build/Goccia.*.Test.exe

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: gocciascript-${{ matrix.platform }}
          if-no-files-found: ignore
          path: build/

  release:
    needs: [test, wasm-test, benchmark, examples]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: build-*

      - name: Package releases
        run: |
          platforms=("macos-arm64" "macos-x64" "linux-x64" "linux-arm64" "win-x64" "win-x86")

          for platform in "${platforms[@]}"; do
            artifact_dir="artifacts/build-${platform}"
            if [ ! -d "$artifact_dir" ]; then
              echo "Skipping $platform (no artifact found)"
              continue
            fi

            pkg_dir="gocciascript-${platform}"
            mkdir -p "$pkg_dir"

            find "$artifact_dir" -maxdepth 1 -type f ! -name '*.Test' ! -name '*.Test.exe' -exec cp {} "$pkg_dir/" \;
            cp -r tests/ "$pkg_dir/tests/"
            cp -r benchmarks/ "$pkg_dir/benchmarks/"
            cp -r examples/ "$pkg_dir/examples/"

            if [[ "$platform" == win-* ]]; then
              zip -r "gocciascript-${platform}.zip" "$pkg_dir/"
            else
              tar -czf "gocciascript-${platform}.tar.gz" "$pkg_dir/"
            fi

            rm -rf "$pkg_dir"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gocciascript-*.tar.gz
            gocciascript-*.zip
