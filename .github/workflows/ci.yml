name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FPC_VERSION: "3.2.2"

jobs:
  toolchain:
    uses: ./.github/workflows/toolchain.yml

  build:
    needs: toolchain
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            cpu: aarch64
            os: darwin
            native: true
          - target: x86_64-darwin
            cpu: x86_64
            os: darwin
          - target: x86_64-linux
            cpu: x86_64
            os: linux
          - target: aarch64-linux
            cpu: aarch64
            os: linux
          - target: x86_64-win64
            cpu: x86_64
            os: win64
          - target: i386-win32
            cpu: i386
            os: win32
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Restore toolchain cache
        uses: actions/cache/restore@v5
        with:
          path: |
            fpc-cross
            cross-binutils
            cross-libs
          key: ${{ needs.toolchain.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Cross-compile GocciaScript
        run: |
          set -euo pipefail
          PREFIX="$PWD/fpc-cross"
          export PATH="$PREFIX/bin:$PWD/cross-binutils/bin:$PATH"

          echo "Target: ${{ matrix.target }}"

          CPU="${{ matrix.cpu }}"
          OS="${{ matrix.os }}"
          TARGET="${CPU}-${OS}"
          NATIVE="${{ matrix.native }}"

          # Determine the cross-compiler binary
          if [ "$NATIVE" = "true" ]; then
            CROSS_FPC="$PREFIX/lib/fpc/${FPC_VERSION}/ppca64"
          else
            case "$CPU" in
              x86_64)  CROSS_FPC="$PREFIX/lib/fpc/${FPC_VERSION}/ppcrossx64" ;;
              i386)    CROSS_FPC="$PREFIX/lib/fpc/${FPC_VERSION}/ppcross386" ;;
              aarch64) CROSS_FPC="$PREFIX/lib/fpc/${FPC_VERSION}/ppca64" ;;
            esac
          fi

          # Determine extra flags for cross targets
          EXTRA_FLAGS=""
          case "$OS" in
            linux)
              LIBDIR=$(find "$PWD/cross-libs/${CPU}-linux" -name "libc.so" -exec dirname {} \; | head -1)
              EXTRA_FLAGS="-XP${CPU}-linux- -Fl${LIBDIR}"
              ;;
            win32|win64)
              EXTRA_FLAGS=""
              ;;
            darwin)
              SDK_LIB="$(xcrun --show-sdk-path)/usr/lib"
              EXTRA_FLAGS="-Fl${SDK_LIB}"
              ;;
          esac

          mkdir -p "build"

          RTL_DIR="$PREFIX/lib/fpc/${FPC_VERSION}/units/${TARGET}/rtl"
          OBJPAS_DIR="$PREFIX/lib/fpc/${FPC_VERSION}/units/${TARGET}/rtl-objpas"
          GEN_DIR="$PREFIX/lib/fpc/${FPC_VERSION}/units/${TARGET}/rtl-generics"
          FCL_DIR="$PREFIX/lib/fpc/${FPC_VERSION}/units/${TARGET}/fcl-process"

          # Verify RTL units exist
          echo "RTL units: $(ls "$RTL_DIR"/*.ppu 2>/dev/null | wc -l) .ppu files"
          echo "rtl-objpas units: $(ls "$OBJPAS_DIR"/*.ppu 2>/dev/null | wc -l) .ppu files"
          echo "rtl-generics units: $(ls "$GEN_DIR"/*.ppu 2>/dev/null | wc -l) .ppu files"
          echo "fcl-process units: $(ls "$FCL_DIR"/*.ppu 2>/dev/null | wc -l) .ppu files"

          # Build main binaries
          for src in ScriptLoader.dpr TestRunner.dpr BenchmarkRunner.dpr REPL.dpr; do
            name="${src%.dpr}"
            echo ""
            echo "=== Building ${name} for ${TARGET} ==="
            "$CROSS_FPC" -T"${OS}" -O4 -dPRODUCTION -Xs -CX -XX -B \
              -Fu./units -Fu./souffle \
              -Fi./units -Fi./souffle \
              -Fu"$RTL_DIR" -Fu"$OBJPAS_DIR" -Fu"$GEN_DIR" -Fu"$FCL_DIR" \
              -FU"build" -FE"build" \
              $EXTRA_FLAGS \
              -dFPC_SOFT_FPUX80 \
              "$src"
            echo "${name} built successfully for ${TARGET}"
          done

          # Build test binaries
          for src in $(find units -name '*.Test.pas'); do
            name="$(basename "${src%.pas}")"
            echo ""
            echo "=== Building ${name} for ${TARGET} ==="
            "$CROSS_FPC" -T"${OS}" -O4 -dPRODUCTION -Xs -CX -XX -B \
              -Fu./units -Fu./souffle \
              -Fi./units -Fi./souffle \
              -Fu"$RTL_DIR" -Fu"$OBJPAS_DIR" -Fu"$GEN_DIR" -Fu"$FCL_DIR" \
              -FU"build" -FE"build" \
              $EXTRA_FLAGS \
              -dFPC_SOFT_FPUX80 \
              "$src"
            echo "${name} built successfully for ${TARGET}"
          done

          echo ""
          echo "=== Build artifacts for ${TARGET} ==="
          ls -la build/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          retention-days: 1
          path: build/

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            runner: macos-latest
          - target: x86_64-darwin
            runner: macos-15-intel
          - target: x86_64-linux
            runner: ubuntu-latest
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
          - target: x86_64-win64
            runner: windows-latest
          - target: i386-win32
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Run all JavaScript tests (interpreted)
        run: ./build/TestRunner tests --silent --no-progress --output=test-results-interpreted.json

      - name: Run all JavaScript tests (bytecode)
        run: ./build/TestRunner tests --mode=bytecode --silent --no-progress --output=test-results-bytecode.json

      - name: Run Pascal unit tests
        run: |
          ./build/Goccia.Values.Primitives.Test
          ./build/Goccia.Values.FunctionValue.Test
          ./build/Goccia.Values.ObjectValue.Test
          ./build/Goccia.Compiler.Test
          ./build/Goccia.Builtins.TestAssertions.Test

  wasm-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            runner: macos-latest
          - target: x86_64-darwin
            runner: macos-15-intel
          - target: x86_64-linux
            runner: ubuntu-latest
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
          - target: x86_64-win64
            runner: windows-latest
          - target: i386-win32
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run WASM integration tests
        run: node ./tests-wasm/run-wasm-tests.mjs

  benchmark:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            runner: macos-latest
            mode: interpreted
          - target: aarch64-darwin
            runner: macos-latest
            mode: bytecode
          - target: x86_64-darwin
            runner: macos-15-intel
            mode: interpreted
          - target: x86_64-darwin
            runner: macos-15-intel
            mode: bytecode
          - target: x86_64-linux
            runner: ubuntu-latest
            mode: interpreted
          - target: x86_64-linux
            runner: ubuntu-latest
            mode: bytecode
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
            mode: interpreted
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
            mode: bytecode
          - target: x86_64-win64
            runner: windows-latest
            mode: interpreted
          - target: x86_64-win64
            runner: windows-latest
            mode: bytecode
          - target: i386-win32
            runner: windows-latest
            mode: interpreted
          - target: i386-win32
            runner: windows-latest
            mode: bytecode
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Run benchmarks
        if: "!(github.ref == 'refs/heads/main' && matrix.target == 'x86_64-linux')"
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: ./build/BenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress

      - name: Run benchmarks and save baseline
        if: github.ref == 'refs/heads/main' && matrix.target == 'x86_64-linux'
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: ./build/BenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress --format=console --format=json --output=benchmark-${{ matrix.mode }}-results.json

      - name: Cache benchmark baseline
        if: github.ref == 'refs/heads/main' && matrix.target == 'x86_64-linux'
        uses: actions/cache/save@v5
        with:
          path: benchmark-${{ matrix.mode }}-results.json
          key: benchmark-${{ matrix.mode }}-baseline-${{ github.sha }}

  examples:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            runner: macos-latest
          - target: x86_64-darwin
            runner: macos-15-intel
          - target: x86_64-linux
            runner: ubuntu-latest
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
          - target: x86_64-win64
            runner: windows-latest
          - target: i386-win32
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Run example scripts
        run: ./build/ScriptLoader examples

  artifacts:
    needs: [test, wasm-test, benchmark, examples]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-darwin
          - x86_64-darwin
          - x86_64-linux
          - aarch64-linux
          - x86_64-win64
          - i386-win32
    steps:
      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          path: build/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: gocciascript-release-${{ matrix.target }}
          if-no-files-found: ignore
          path: |
            build/ScriptLoader
            build/ScriptLoader.exe
            build/TestRunner
            build/TestRunner.exe
            build/BenchmarkRunner
            build/BenchmarkRunner.exe
            build/REPL
            build/REPL.exe

  release:
    needs: [test, wasm-test, benchmark, examples]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Package releases
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Map target names to user-friendly archive names
          declare -A DISPLAY_NAMES=(
            ["aarch64-darwin"]="macos-arm64"
            ["x86_64-darwin"]="macos-x64"
            ["x86_64-linux"]="linux-x64"
            ["aarch64-linux"]="linux-arm64"
            ["x86_64-win64"]="windows-x64"
            ["i386-win32"]="windows-x86"
          )

          targets=("aarch64-darwin" "x86_64-darwin" "x86_64-linux" "aarch64-linux" "x86_64-win64" "i386-win32")

          for target in "${targets[@]}"; do
            artifact_dir="artifacts/gocciascript-${target}"
            if [ ! -d "$artifact_dir" ]; then
              echo "Skipping $target (no artifact found)"
              continue
            fi

            display="${DISPLAY_NAMES[$target]}"
            archive_name="gocciascript-${VERSION}-${display}"
            pkg_dir="${archive_name}"
            mkdir -p "$pkg_dir"

            find "$artifact_dir" -maxdepth 1 -type f ! -name '*.Test' ! -name '*.Test.exe' -exec cp {} "$pkg_dir/" \;
            cp -r tests/ "$pkg_dir/tests/"
            cp -r benchmarks/ "$pkg_dir/benchmarks/"
            cp -r examples/ "$pkg_dir/examples/"

            if [[ "$target" == *win* ]]; then
              zip -r "${archive_name}.zip" "$pkg_dir/"
            else
              tar -czf "${archive_name}.tar.gz" "$pkg_dir/"
            fi

            rm -rf "$pkg_dir"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gocciascript-*.tar.gz
            gocciascript-*.zip
