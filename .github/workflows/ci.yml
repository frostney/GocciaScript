name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FPC_VERSION: "3.2.2"

jobs:
  toolchain:
    uses: ./.github/workflows/toolchain.yml

  build:
    needs: toolchain
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            cpu: aarch64
            os: darwin
            native: true
          - target: x86_64-darwin
            cpu: x86_64
            os: darwin
          - target: x86_64-linux
            cpu: x86_64
            os: linux
          - target: aarch64-linux
            cpu: aarch64
            os: linux
          - target: x86_64-win64
            cpu: x86_64
            os: win64
          - target: i386-win32
            cpu: i386
            os: win32
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Restore toolchain cache
        uses: actions/cache/restore@v5
        with:
          path: |
            fpc-cross
            cross-binutils
            cross-libs
          key: ${{ needs.toolchain.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Cross-compile GocciaScript
        run: |
          set -euo pipefail
          PREFIX="$PWD/fpc-cross"
          export PATH="$PREFIX/bin:$PWD/cross-binutils/bin:$PATH"

          echo "Target: ${{ matrix.target }}"

          CPU="${{ matrix.cpu }}"
          OS="${{ matrix.os }}"
          TARGET="${CPU}-${OS}"
          NATIVE="${{ matrix.native }}"

          # Determine the cross-compiler binary
          if [ "$NATIVE" = "true" ]; then
            CROSS_FPC="$PREFIX/lib/fpc/${FPC_VERSION}/ppca64"
          else
            case "$CPU" in
              x86_64)  CROSS_FPC="$PREFIX/lib/fpc/${FPC_VERSION}/ppcrossx64" ;;
              i386)    CROSS_FPC="$PREFIX/lib/fpc/${FPC_VERSION}/ppcross386" ;;
              aarch64) CROSS_FPC="$PREFIX/lib/fpc/${FPC_VERSION}/ppca64" ;;
            esac
          fi

          # Determine extra flags for cross targets
          EXTRA_FLAGS=""
          case "$OS" in
            linux)
              LIBDIR=$(find "$PWD/cross-libs/${CPU}-linux" -name "libc.so" -exec dirname {} \; | head -1)
              if [ -z "$LIBDIR" ]; then echo "::error::libc.so not found in cross-libs/${CPU}-linux"; exit 1; fi
              EXTRA_FLAGS="-XP${CPU}-linux- -Fl${LIBDIR}"
              ;;
            win32|win64)
              EXTRA_FLAGS=""
              ;;
            darwin)
              SDK_LIB="$(xcrun --show-sdk-path)/usr/lib"
              EXTRA_FLAGS="-Fl${SDK_LIB}"
              ;;
          esac

          mkdir -p "build"

          # Generate baked version constants
          DESCRIBE="$(git describe --tags --always 2>/dev/null || echo "")"
          GC_COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")"
          if [ -z "$GC_COMMIT" ]; then GC_COMMIT="unknown"; fi
          if [ -z "$DESCRIBE" ] || ! echo "$DESCRIBE" | grep -q '\.'; then
            GC_VERSION="0.0.0-dev"
          elif echo "$DESCRIBE" | grep -q '-'; then
            GC_VERSION="${DESCRIBE%%-*}-dev"
          else
            GC_VERSION="$DESCRIBE"
          fi
          printf '%s\n' \
            "// Auto-generated by CI — do not edit" \
            "const" \
            "  BAKED_VERSION = '$GC_VERSION';" \
            "  BAKED_COMMIT = '$GC_COMMIT';" \
            > units/Goccia.Version.Generated.inc

          RTL_DIR="$PREFIX/lib/fpc/${FPC_VERSION}/units/${TARGET}/rtl"
          OBJPAS_DIR="$PREFIX/lib/fpc/${FPC_VERSION}/units/${TARGET}/rtl-objpas"
          GEN_DIR="$PREFIX/lib/fpc/${FPC_VERSION}/units/${TARGET}/rtl-generics"
          FCL_DIR="$PREFIX/lib/fpc/${FPC_VERSION}/units/${TARGET}/fcl-process"
          FCL_BASE_SRC="$PREFIX/share/fpcsrc/packages/fcl-base/src"
          REGEXPR_SRC="$PREFIX/share/fpcsrc/packages/regexpr/src"

          # Verify RTL units exist
          echo "RTL units: $(ls "$RTL_DIR"/*.ppu 2>/dev/null | wc -l) .ppu files"
          echo "rtl-objpas units: $(ls "$OBJPAS_DIR"/*.ppu 2>/dev/null | wc -l) .ppu files"
          echo "rtl-generics units: $(ls "$GEN_DIR"/*.ppu 2>/dev/null | wc -l) .ppu files"
          echo "fcl-process units: $(ls "$FCL_DIR"/*.ppu 2>/dev/null | wc -l) .ppu files"
          echo "fcl-base source path: $FCL_BASE_SRC"
          echo "regexpr source path: $REGEXPR_SRC"
          test -d "$FCL_BASE_SRC"
          test -d "$REGEXPR_SRC"

          # Build top-level program entrypoints
          shopt -s nullglob
          entrypoints=(./*.dpr)
          if [ "${#entrypoints[@]}" -eq 0 ]; then
            echo "::error::No top-level .dpr entrypoints found"
            exit 1
          fi

          for src in "${entrypoints[@]}"; do
            name="$(basename "${src%.dpr}")"
            echo ""
            echo "=== Building ${name} for ${TARGET} ==="
            "$CROSS_FPC" -T"${OS}" -O4 -dPRODUCTION -Xs -CX -XX -B \
              -Fu./units -Fu./souffle \
              -Fi./units -Fi./souffle \
              -Fu"$RTL_DIR" -Fu"$OBJPAS_DIR" -Fu"$GEN_DIR" -Fu"$FCL_DIR" -Fu"$FCL_BASE_SRC" -Fu"$REGEXPR_SRC" \
              -FU"build" -FE"build" \
              $EXTRA_FLAGS \
              -dFPC_SOFT_FPUX80 \
              "$src"
            echo "${name} built successfully for ${TARGET}"
          done

          # Build test binaries
          for src in $(find units -name '*.Test.pas'); do
            name="$(basename "${src%.pas}")"
            echo ""
            echo "=== Building ${name} for ${TARGET} ==="
            "$CROSS_FPC" -T"${OS}" -O4 -dPRODUCTION -Xs -CX -XX -B \
              -Fu./units -Fu./souffle \
              -Fi./units -Fi./souffle \
              -Fu"$RTL_DIR" -Fu"$OBJPAS_DIR" -Fu"$GEN_DIR" -Fu"$FCL_DIR" -Fu"$FCL_BASE_SRC" -Fu"$REGEXPR_SRC" \
              -FU"build" -FE"build" \
              $EXTRA_FLAGS \
              -dFPC_SOFT_FPUX80 \
              "$src"
            echo "${name} built successfully for ${TARGET}"
          done

          echo ""
          echo "=== Building GocciaTOMLCheck for ${TARGET} ==="
          "$CROSS_FPC" -T"${OS}" -O4 -dPRODUCTION -Xs -CX -XX -B \
            -Fu./units -Fu./souffle \
            -Fi./units -Fi./souffle \
            -Fu"$RTL_DIR" -Fu"$OBJPAS_DIR" -Fu"$GEN_DIR" -Fu"$FCL_DIR" -Fu"$FCL_BASE_SRC" -Fu"$REGEXPR_SRC" \
            -FU"build" -FE"build" \
            $EXTRA_FLAGS \
            -dFPC_SOFT_FPUX80 \
            "./scripts/GocciaTOMLCheck.dpr"
          echo "GocciaTOMLCheck built successfully for ${TARGET}"

          echo ""
          echo "=== Building GocciaJSON5Check for ${TARGET} ==="
          "$CROSS_FPC" -T"${OS}" -O4 -dPRODUCTION -Xs -CX -XX -B \
            -Fu./units -Fu./souffle \
            -Fi./units -Fi./souffle \
            -Fu"$RTL_DIR" -Fu"$OBJPAS_DIR" -Fu"$GEN_DIR" -Fu"$FCL_DIR" -Fu"$FCL_BASE_SRC" -Fu"$REGEXPR_SRC" \
            -FU"build" -FE"build" \
            $EXTRA_FLAGS \
            -dFPC_SOFT_FPUX80 \
            "./scripts/GocciaJSON5Check.dpr"
          echo "GocciaJSON5Check built successfully for ${TARGET}"

          echo ""
          echo "=== Build artifacts for ${TARGET} ==="
          ls -la build/

      - name: Stage build artifacts
        run: bash ./.github/scripts/stage-build-artifacts.sh build ci-artifacts --include-tests --strip

      - name: Stage TOML compliance harness
        run: |
          copied=0
          for candidate in build/GocciaTOMLCheck build/GocciaTOMLCheck.exe; do
            if [ -f "$candidate" ]; then
              cp "$candidate" ci-artifacts/
              copied=1
            fi
          done
          if [ "$copied" -eq 0 ]; then
            echo "::error::Missing compiled GocciaTOMLCheck binary in build/"
            exit 1
          fi

      - name: Stage JSON5 compliance harness
        run: |
          copied=0
          for candidate in build/GocciaJSON5Check build/GocciaJSON5Check.exe; do
            if [ -f "$candidate" ]; then
              cp "$candidate" ci-artifacts/
              copied=1
            fi
          done
          if [ "$copied" -eq 0 ]; then
            echo "::error::Missing compiled GocciaJSON5Check binary in build/"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          retention-days: 1
          path: ci-artifacts/*

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            runner: macos-latest
          - target: x86_64-darwin
            runner: macos-15-intel
          - target: x86_64-linux
            runner: ubuntu-latest
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
          - target: x86_64-win64
            runner: windows-latest
          - target: i386-win32
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Build FFI fixture library
        if: runner.os != 'Windows'
        run: ./fixtures/ffi/build.sh

      - name: Set up MSYS2 (MINGW32)
        if: matrix.target == 'i386-win32'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          install: mingw-w64-i686-gcc

      - name: Build FFI fixture library (Windows 32-bit)
        if: matrix.target == 'i386-win32'
        shell: msys2 {0}
        run: gcc -shared -o fixtures/ffi/libfixture.dll fixtures/ffi/fixture.c

      - name: Build FFI fixture library (Windows 64-bit)
        if: runner.os == 'Windows' && matrix.target != 'i386-win32'
        run: gcc -shared -o fixtures/ffi/libfixture.dll fixtures/ffi/fixture.c

      - name: Run all JavaScript tests (interpreted)
        run: ./build/TestRunner tests --asi --silent --no-progress --output=test-results-interpreted.json

      - name: Run all JavaScript tests (bytecode)
        run: ./build/TestRunner tests --asi --mode=bytecode --silent --no-progress --output=test-results-bytecode.json

      - name: Check TestRunner CLI behaviour
        run: |
          grep -q '"mode": "interpreted"' test-results-interpreted.json
          grep -q '"totalFiles":' test-results-interpreted.json
          grep -q '"mode": "bytecode"' test-results-bytecode.json
          grep -q '"totalFiles":' test-results-bytecode.json

      - name: Check TestRunner coverage CLI
        run: |
          cov_output="$(./build/TestRunner tests/built-ins/Array/array-creation.js --coverage 2>&1)"
          printf '%s\n' "$cov_output" | grep -q 'Coverage Summary:'
          printf '%s\n' "$cov_output" | grep -q 'array-creation.js'

          ./build/TestRunner tests/built-ins/Array/array-creation.js --coverage --coverage-format=lcov --coverage-output=cov.lcov
          grep -q '^SF:' cov.lcov
          grep -q '^DA:' cov.lcov
          grep -q '^end_of_record' cov.lcov
          rm cov.lcov

          ./build/TestRunner tests/built-ins/Array/array-creation.js --coverage --coverage-format=json --coverage-output=cov.json
          grep -q '"path":' cov.json
          grep -q '"statementMap":' cov.json
          rm cov.json

          ./build/TestRunner tests/built-ins/Array/array-creation.js --coverage --coverage-output=cov2.lcov --coverage-format=lcov
          grep -q '^DA:' cov2.lcov
          rm cov2.lcov

          detail_output="$(./build/TestRunner tests/built-ins/Array/array-creation.js --coverage 2>&1)"
          printf '%s\n' "$detail_output" | grep -Eq '[0-9]+x \|'

          bytecode_cov="$(./build/TestRunner tests/built-ins/Array/array-creation.js --mode=bytecode --coverage 2>&1)"
          printf '%s\n' "$bytecode_cov" | grep -q 'Coverage Summary:'

          ./build/TestRunner tests/language/statements/if/if-else-statements.js --coverage --coverage-format=lcov --coverage-output=branch-cov.lcov
          grep -q '^BRDA:' branch-cov.lcov
          grep -q '^BRF:' branch-cov.lcov
          grep -q '^BRH:' branch-cov.lcov
          rm branch-cov.lcov

          ./build/TestRunner tests/language/statements/if/if-else-statements.js --coverage --coverage-format=json --coverage-output=branch-cov.json
          grep -q '"branchMap":' branch-cov.json
          grep -q '"b":' branch-cov.json
          rm branch-cov.json

      - name: Run Pascal unit tests
        run: |
          found=0
          for test_bin in build/Goccia.*.Test build/Goccia.*.Test.exe; do
            if [ -f "$test_bin" ]; then
              found=1
              "$test_bin"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No Pascal unit test binaries found"
            exit 1
          fi

  toml-compliance:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            runner: macos-latest
          - target: x86_64-darwin
            runner: macos-15-intel
          - target: x86_64-linux
            runner: ubuntu-latest
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
          - target: x86_64-win64
            runner: windows-latest
          - target: i386-win32
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Run TOML 1.1.0 compliance suite
        run: |
          PYTHON_BIN="$(command -v python3 || command -v python)"
          HARNESS="./build/GocciaTOMLCheck"
          if [ -f "./build/GocciaTOMLCheck.exe" ]; then
            HARNESS="./build/GocciaTOMLCheck.exe"
          fi
          "$PYTHON_BIN" scripts/run_toml_test_suite.py --harness="$HARNESS" --output=toml-test-results-${{ matrix.target }}.json

      - name: Check TOML compliance summary
        if: always()
        run: |
          PYTHON_BIN="$(command -v python3 || command -v python)"
          "$PYTHON_BIN" - <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path("toml-test-results-${{ matrix.target }}.json")
          if not path.exists():
            print(f"::error::Missing TOML report: {path}")
            sys.exit(1)

          summary = json.loads(path.read_text())["summary"]
          expected_zero = ["failed", "false_accepts", "false_rejects", "valid_mismatches", "timeouts"]
          for key in expected_zero:
            if summary.get(key) != 0:
              print(f"::error::{key}={summary.get(key)} in {path}")
              print(json.dumps(summary, indent=2))
              sys.exit(1)
          if summary.get("total") != summary.get("passed"):
            print(f"::error::passed={summary.get('passed')} total={summary.get('total')} in {path}")
            print(json.dumps(summary, indent=2))
            sys.exit(1)
          PY

      - name: Upload TOML compliance report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: toml-test-results-${{ matrix.target }}
          retention-days: 1
          path: toml-test-results-${{ matrix.target }}.json

  json5-compliance:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            runner: macos-latest
          - target: x86_64-darwin
            runner: macos-15-intel
          - target: x86_64-linux
            runner: ubuntu-latest
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
          - target: x86_64-win64
            runner: windows-latest
          - target: i386-win32
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Run JSON5 compliance suite
        run: |
          PYTHON_BIN="$(command -v python3 || command -v python)"
          HARNESS="./build/GocciaJSON5Check"
          TEST_RUNNER="./build/TestRunner"
          if [ -f "./build/GocciaJSON5Check.exe" ]; then
            HARNESS="./build/GocciaJSON5Check.exe"
          fi
          if [ -f "./build/TestRunner.exe" ]; then
            TEST_RUNNER="./build/TestRunner.exe"
          fi
          "$PYTHON_BIN" scripts/run_json5_test_suite.py --harness="$HARNESS" --test-runner="$TEST_RUNNER" --output=json5-test-results-${{ matrix.target }}.json

      - name: Check JSON5 compliance summary
        if: always()
        run: |
          PYTHON_BIN="$(command -v python3 || command -v python)"
          "$PYTHON_BIN" - <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path("json5-test-results-${{ matrix.target }}.json")
          if not path.exists():
            print(f"::error::Missing JSON5 report: {path}")
            sys.exit(1)

          summary = json.loads(path.read_text())
          parse_summary = summary["summary"]["parse"]
          stringify_summary = summary["summary"]["stringify"]

          expected_parse_zero = ["failed", "false_accepts", "false_rejects", "valid_mismatches", "timeouts"]
          for key in expected_parse_zero:
            if parse_summary.get(key) != 0:
              print(f"::error::parse.{key}={parse_summary.get(key)} in {path}")
              print(json.dumps(summary, indent=2))
              sys.exit(1)

          if parse_summary.get("total") != parse_summary.get("passed"):
            print(f"::error::parse.passed={parse_summary.get('passed')} parse.total={parse_summary.get('total')} in {path}")
            print(json.dumps(summary, indent=2))
            sys.exit(1)

          expected_stringify_zero = ["failed", "skipped"]
          for key in expected_stringify_zero:
            if stringify_summary.get(key) != 0:
              print(f"::error::stringify.{key}={stringify_summary.get(key)} in {path}")
              print(json.dumps(summary, indent=2))
              sys.exit(1)

          if stringify_summary.get("totalTests") != stringify_summary.get("passed"):
            print(f"::error::stringify.passed={stringify_summary.get('passed')} stringify.totalTests={stringify_summary.get('totalTests')} in {path}")
            print(json.dumps(summary, indent=2))
            sys.exit(1)
          PY

      - name: Upload JSON5 compliance report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: json5-test-results-${{ matrix.target }}
          retention-days: 1
          path: json5-test-results-${{ matrix.target }}.json

  benchmark:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            runner: macos-latest
            mode: interpreted
          - target: aarch64-darwin
            runner: macos-latest
            mode: bytecode
          - target: x86_64-darwin
            runner: macos-15-intel
            mode: interpreted
          - target: x86_64-darwin
            runner: macos-15-intel
            mode: bytecode
          - target: x86_64-linux
            runner: ubuntu-latest
            mode: interpreted
          - target: x86_64-linux
            runner: ubuntu-latest
            mode: bytecode
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
            mode: interpreted
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
            mode: bytecode
          - target: x86_64-win64
            runner: windows-latest
            mode: interpreted
          - target: x86_64-win64
            runner: windows-latest
            mode: bytecode
          - target: i386-win32
            runner: windows-latest
            mode: interpreted
          - target: i386-win32
            runner: windows-latest
            mode: bytecode
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Run benchmarks
        if: "!(github.ref == 'refs/heads/main' && matrix.target == 'x86_64-linux')"
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: ./build/BenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress

      - name: Check BenchmarkRunner CLI behaviour
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: |
          if [ "${{ matrix.mode }}" = "bytecode" ]; then
            ./build/BenchmarkRunner benchmarks/fibonacci.js --mode=bytecode --no-progress --format=json --output=benchmark-file-bytecode.json
            grep -q '"file": "benchmarks/fibonacci.js"' benchmark-file-bytecode.json
            grep -q '"totalBenchmarks":' benchmark-file-bytecode.json

            printf 'suite("stdin", () => {\n  bench("sum", {\n    run: () => 1 + 1,\n  });\n});\n' | \
              ./build/BenchmarkRunner - --mode=bytecode --no-progress --format=json --output=benchmark-stdin-bytecode.json
            grep -q '"files": \[' benchmark-stdin-bytecode.json
            grep -q '"name": "sum"' benchmark-stdin-bytecode.json
            grep -q '"totalBenchmarks": 1' benchmark-stdin-bytecode.json
          else
            ./build/BenchmarkRunner benchmarks/fibonacci.js --no-progress --format=json --output=benchmark-file.json
            grep -q '"file": "benchmarks/fibonacci.js"' benchmark-file.json
            grep -q '"totalBenchmarks":' benchmark-file.json

            printf 'suite("stdin", () => {\n  bench("sum", {\n    run: () => 1 + 1,\n  });\n});\n' | \
              ./build/BenchmarkRunner --no-progress --format=json --output=benchmark-stdin.json
            grep -q '"files": \[' benchmark-stdin.json
            grep -q '"name": "sum"' benchmark-stdin.json
            grep -q '"totalBenchmarks": 1' benchmark-stdin.json
          fi

      - name: Run benchmarks and save baseline
        if: github.ref == 'refs/heads/main' && matrix.target == 'x86_64-linux'
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: ./build/BenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress --format=console --format=json --output=benchmark-${{ matrix.mode }}-results.json

      - name: Check benchmark CLI behaviour
        if: github.ref == 'refs/heads/main' && matrix.target == 'x86_64-linux'
        run: |
          grep -q '"files": \[' benchmark-${{ matrix.mode }}-results.json
          grep -q '"totalBenchmarks":' benchmark-${{ matrix.mode }}-results.json

      - name: Cache benchmark baseline
        if: github.ref == 'refs/heads/main' && matrix.target == 'x86_64-linux'
        uses: actions/cache/save@v5
        with:
          path: benchmark-${{ matrix.mode }}-results.json
          key: benchmark-${{ matrix.mode }}-baseline-${{ github.sha }}

  examples:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            runner: macos-latest
          - target: x86_64-darwin
            runner: macos-15-intel
          - target: x86_64-linux
            runner: ubuntu-latest
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
          - target: x86_64-win64
            runner: windows-latest
          - target: i386-win32
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          path: build/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/*

      - name: Run example scripts
        run: ./build/ScriptLoader examples

      - name: Run stdin smoke tests
        run: |
          script_output="$(printf 'const x = 2 + 2;\nx;\n' | ./build/ScriptLoader)"
          printf '%s\n' "$script_output" | grep -q 'Result: 4'

          script_output_bytecode="$(printf 'const x = 2 + 2;\nx;\n' | ./build/ScriptLoader - --mode=bytecode)"
          printf '%s\n' "$script_output_bytecode" | grep -q 'Result: 4'

      - name: Check ScriptLoader CLI behaviour
        run: |
          PYTHON_BIN="$(command -v python3 || command -v python)"

          json_output="$(printf '%s\n' "console.log('hi');" '2 + 2;' | ./build/ScriptLoader --output=json)"
          printf '%s\n' "$json_output" | grep -q '"ok":true'
          printf '%s\n' "$json_output" | grep -q '"value":4'
          printf '%s\n' "$json_output" | grep -Eq '"output":"hi(\\r)?\\n"'

          json_output_bytecode="$(printf '%s\n' "console.log('hi');" '2 + 2;' | ./build/ScriptLoader - --mode=bytecode --output=json)"
          printf '%s\n' "$json_output_bytecode" | grep -q '"ok":true'
          printf '%s\n' "$json_output_bytecode" | grep -q '"value":4'
          printf '%s\n' "$json_output_bytecode" | grep -Eq '"output":"hi(\\r)?\\n"'

          globals_output="$(printf '%s\n' 'x + y;' | ./build/ScriptLoader --global x=10 --global y=20 --output=json)"
          printf '%s\n' "$globals_output" | grep -q '"ok":true'
          printf '%s\n' "$globals_output" | grep -q '"value":30'

          printf '%s\n' '{"name":"goccia"}' > cli-globals.json
          globals_file_output="$(printf '%s\n' 'name;' | ./build/ScriptLoader --globals=cli-globals.json --mode=bytecode --output=json)"
          printf '%s\n' "$globals_file_output" | grep -q '"ok":true'
          printf '%s\n' "$globals_file_output" | grep -q '"value":"goccia"'

          printf '%s\n' '{"name":"file-value"}' > cli-globals.json
          globals_override_output="$(printf '%s\n' 'name;' | ./build/ScriptLoader --globals=cli-globals.json --global name=override --output=json)"
          printf '%s\n' "$globals_override_output" | grep -q '"ok":true'
          printf '%s\n' "$globals_override_output" | grep -q '"value":"override"'

          plain_string_output="$(printf '%s\n' 'name;' | ./build/ScriptLoader --global name=plain-value --output=json)"
          printf '%s\n' "$plain_string_output" | grep -q '"ok":true'
          printf '%s\n' "$plain_string_output" | grep -q '"value":"plain-value"'

          printf '%s\n' 'export const name = "module-value";' > cli-globals-module.js
          globals_module_output="$(printf '%s\n' 'name;' | ./build/ScriptLoader --globals=./cli-globals-module.js --output=json)"
          printf '%s\n' "$globals_module_output" | grep -q '"ok":true'
          printf '%s\n' "$globals_module_output" | grep -q '"value":"module-value"'

          set +e
          timeout_output="$("$PYTHON_BIN" - <<'PY'
          import subprocess
          import sys

          script = 'const iterable = { [Symbol.iterator]: () => ({ next: () => ({ done: false, value: 1 }) }) }; for (const x of iterable) { }' + '\n'
          try:
              result = subprocess.run(
                  ['./build/ScriptLoader', '--timeout=50', '--output=json'],
                  input=script,
                  text=True,
                  capture_output=True,
                  timeout=10,
                  check=False,
              )
          except subprocess.TimeoutExpired:
              sys.exit(124)

          sys.stdout.write(result.stdout)
          sys.stderr.write(result.stderr)
          sys.exit(result.returncode)
          PY
          )"
          timeout_status=$?
          set -e
          test "$timeout_status" -eq 1
          printf '%s\n' "$timeout_output" | grep -q '"ok":false'
          printf '%s\n' "$timeout_output" | grep -q '"type":"TimeoutError"'
          printf '%s\n' "$timeout_output" | grep -q '"message":"Execution timed out after 50ms"'

          set +e
          timeout_output_bytecode="$("$PYTHON_BIN" - <<'PY'
          import subprocess
          import sys

          script = 'const iterable = { [Symbol.iterator]: () => ({ next: () => ({ done: false, value: 1 }) }) }; for (const x of iterable) { }' + '\n'
          try:
              result = subprocess.run(
                  ['./build/ScriptLoader', '-', '--mode=bytecode', '--timeout=50', '--output=json'],
                  input=script,
                  text=True,
                  capture_output=True,
                  timeout=10,
                  check=False,
              )
          except subprocess.TimeoutExpired:
              sys.exit(124)

          sys.stdout.write(result.stdout)
          sys.stderr.write(result.stderr)
          sys.exit(result.returncode)
          PY
          )"
          timeout_status_bytecode=$?
          set -e
          test "$timeout_status_bytecode" -eq 1
          printf '%s\n' "$timeout_output_bytecode" | grep -q '"ok":false'
          printf '%s\n' "$timeout_output_bytecode" | grep -q '"type":"TimeoutError"'
          printf '%s\n' "$timeout_output_bytecode" | grep -q '"message":"Execution timed out after 50ms"'

          set +e
          globals_collision_output="$(printf '%s\n' 'console;' | ./build/ScriptLoader --global console=1 --output=json)"
          globals_collision_status=$?
          set -e
          test "$globals_collision_status" -eq 1
          printf '%s\n' "$globals_collision_output" | grep -q '"ok":false'
          printf '%s\n' "$globals_collision_output" | grep -q 'Cannot override built-in global'

          set +e
          error_output="$(printf '%s\n' "throw new TypeError('boom');" | ./build/ScriptLoader --output=json)"
          error_status=$?
          set -e
          test "$error_status" -eq 1
          printf '%s\n' "$error_output" | grep -q '"ok":false'
          printf '%s\n' "$error_output" | grep -q '"type":"TypeError"'
          printf '%s\n' "$error_output" | grep -q '"message":"boom"'

      - name: Check ScriptLoader coverage CLI
        run: |
          cov_output="$(printf 'const x = 5;\nx;\n' | ./build/ScriptLoader --coverage 2>&1)"
          printf '%s\n' "$cov_output" | grep -q 'Coverage Summary:'

          json_cov_output="$(printf 'const x = 5;\nx;\n' | ./build/ScriptLoader --output=json --coverage 2>&1)"
          printf '%s\n' "$json_cov_output" | head -1 | grep -q '^{'

          printf 'const x = 5;\nx;\n' | ./build/ScriptLoader --coverage --coverage-format=lcov --coverage-output=sl-cov.lcov
          grep -q '^SF:' sl-cov.lcov
          grep -q '^DA:' sl-cov.lcov
          rm sl-cov.lcov

          printf 'const x = 5;\nx;\n' | ./build/ScriptLoader --coverage --coverage-format=json --coverage-output=sl-cov.json
          grep -q '"path":' sl-cov.json
          rm sl-cov.json

          printf 'const x = 5;\nx;\n' | ./build/ScriptLoader --coverage-output=sl-cov2.lcov --coverage-format=lcov
          grep -q '^DA:' sl-cov2.lcov
          rm sl-cov2.lcov

          bytecode_cov="$(printf 'const x = 5;\nx;\n' | ./build/ScriptLoader --mode=bytecode --coverage 2>&1)"
          printf '%s\n' "$bytecode_cov" | grep -q 'Coverage Summary:'

      - name: Check ScriptLoader error display
        run: |
          set +e
          error_output="$(printf 'const x = 1\nconst y = 2;\n' | ./build/ScriptLoader 2>&1)"
          error_status=$?
          set -e
          test "$error_status" -eq 1
          printf '%s\n' "$error_output" | grep -q 'SyntaxError'
          printf '%s\n' "$error_output" | grep -q '\^'
          printf '%s\n' "$error_output" | grep -qi 'suggestion'

          set +e
          error_output="$(printf 'const s = "hello;\n' | ./build/ScriptLoader 2>&1)"
          error_status=$?
          set -e
          test "$error_status" -eq 1
          printf '%s\n' "$error_output" | grep -q 'SyntaxError'
          printf '%s\n' "$error_output" | grep -q '\^'

          set +e
          json_error="$(printf 'const x = ;\n' | ./build/ScriptLoader --output=json)"
          json_status=$?
          set -e
          test "$json_status" -eq 1
          printf '%s\n' "$json_error" | grep -q '"ok":false'
          printf '%s\n' "$json_error" | grep -q '"type":"SyntaxError"'
          printf '%s\n' "$json_error" | grep -q '"line":'
          printf '%s\n' "$json_error" | grep -q '"column":'

          set +e
          error_output_bc="$(printf 'const x = 1\n' | ./build/ScriptLoader - --mode=bytecode 2>&1)"
          error_status_bc=$?
          set -e
          test "$error_status_bc" -eq 1
          printf '%s\n' "$error_output_bc" | grep -q 'SyntaxError'

      - name: Check numeric separator rejection
        run: |
          # Trailing separator
          set +e; out="$(printf '1_000_;\n' | ./build/ScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1
          printf '%s\n' "$out" | grep -q 'Numeric separator must be between digits'

          # Leading separator after hex prefix
          set +e; out="$(printf '0x_FF;\n' | ./build/ScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

          # Leading separator after binary prefix
          set +e; out="$(printf '0b_10;\n' | ./build/ScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

          # Leading separator after octal prefix
          set +e; out="$(printf '0o_77;\n' | ./build/ScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

          # Consecutive separators
          set +e; out="$(printf '1__000;\n' | ./build/ScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1
          printf '%s\n' "$out" | grep -q 'Numeric separator must be between digits'

          # Separator after leading 0
          set +e; out="$(printf '0_1;\n' | ./build/ScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1
          printf '%s\n' "$out" | grep -q 'Numeric separator cannot be used after leading 0'

          # Separator before decimal point
          set +e; out="$(printf '1_.5;\n' | ./build/ScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

          # Separator after decimal point
          set +e; out="$(printf '1._5;\n' | ./build/ScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

          # Separator after exponent indicator
          set +e; out="$(printf '1e_10;\n' | ./build/ScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

      - name: Check ScriptLoader source map CLI
        run: |
          check_map_json() {
            python3 - "$1" <<'PY'
          import json, sys
          with open(sys.argv[1], 'r', encoding='utf-8') as f:
              data = json.load(f)
          assert data.get('version') == 3, f"bad version: {data.get('version')}"
          assert isinstance(data.get('sources'), list) and len(data['sources']) > 0, "missing sources"
          assert isinstance(data.get('mappings'), str) and data['mappings'] != '', "missing mappings"
          PY
          }

          # Create a JSX test file
          cat > /tmp/sm-test.jsx << 'JSXEOF'
          const createElement = (t, p, ...c) => ({ t, p, c });
          const el = <div id="test">hello</div>;
          el;
          JSXEOF

          # --source-map writes .map file (bytecode mode)
          ./build/ScriptLoader /tmp/sm-test.jsx --source-map --mode=bytecode
          test -f /tmp/sm-test.jsx.map
          check_map_json /tmp/sm-test.jsx.map
          rm /tmp/sm-test.jsx.map

          # --source-map=<path> writes to custom path
          ./build/ScriptLoader /tmp/sm-test.jsx --source-map=/tmp/custom.map --mode=bytecode
          test -f /tmp/custom.map
          check_map_json /tmp/custom.map
          rm /tmp/custom.map

          # --source-map with --emit
          ./build/ScriptLoader /tmp/sm-test.jsx --emit --source-map
          test -f /tmp/sm-test.jsx.map
          check_map_json /tmp/sm-test.jsx.map
          rm /tmp/sm-test.jsx.map /tmp/sm-test.gbc

          # --source-map in interpreted mode
          ./build/ScriptLoader /tmp/sm-test.jsx --source-map
          test -f /tmp/sm-test.jsx.map
          check_map_json /tmp/sm-test.jsx.map
          rm /tmp/sm-test.jsx.map

          # No .map file without --source-map
          ./build/ScriptLoader /tmp/sm-test.jsx --mode=bytecode
          test ! -f /tmp/sm-test.jsx.map

          # --source-map without explicit path rejects stdin
          set +e
          out="$(printf 'const x = 1;\n' | ./build/ScriptLoader --source-map 2>&1)"
          st=$?
          set -e
          test "$st" -eq 1
          printf '%s\n' "$out" | grep -q 'required when reading source from stdin'

          rm /tmp/sm-test.jsx

  artifacts:
    needs: [test, toml-compliance, json5-compliance, benchmark, examples]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-darwin
          - x86_64-darwin
          - x86_64-linux
          - aarch64-linux
          - x86_64-win64
          - i386-win32
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: gocciascript-${{ matrix.target }}
          path: build/

      - name: Stage release artifacts
        run: bash ./.github/scripts/stage-build-artifacts.sh build release-artifacts

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v5
        with:
          name: gocciascript-release-${{ matrix.target }}
          if-no-files-found: ignore
          path: release-artifacts/*

  release:
    needs: [test, toml-compliance, json5-compliance, benchmark, examples]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Package releases
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Map target names to user-friendly archive names
          declare -A DISPLAY_NAMES=(
            ["aarch64-darwin"]="macos-arm64"
            ["x86_64-darwin"]="macos-x64"
            ["x86_64-linux"]="linux-x64"
            ["aarch64-linux"]="linux-arm64"
            ["x86_64-win64"]="windows-x64"
            ["i386-win32"]="windows-x86"
          )

          targets=("aarch64-darwin" "x86_64-darwin" "x86_64-linux" "aarch64-linux" "x86_64-win64" "i386-win32")

          for target in "${targets[@]}"; do
            artifact_dir="artifacts/gocciascript-${target}"
            if [ ! -d "$artifact_dir" ]; then
              echo "Skipping $target (no artifact found)"
              continue
            fi

            display="${DISPLAY_NAMES[$target]}"
            archive_name="gocciascript-${VERSION}-${display}"
            pkg_dir="${archive_name}"
            bash ./.github/scripts/stage-build-artifacts.sh "$artifact_dir" "$pkg_dir"

            cp -r tests/ "$pkg_dir/tests/"
            cp -r benchmarks/ "$pkg_dir/benchmarks/"
            cp -r examples/ "$pkg_dir/examples/"

            if [[ "$target" == *win* ]]; then
              zip -r "${archive_name}.zip" "$pkg_dir/"
            else
              tar -czf "${archive_name}.tar.gz" "$pkg_dir/"
            fi

            rm -rf "$pkg_dir"
          done

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            gocciascript-*.tar.gz
            gocciascript-*.zip

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: -o CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Open changelog PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BRANCH="changelog/${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH" origin/main
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes"
          else
            git commit -m "Update CHANGELOG.md for ${VERSION}"
            git push --force-with-lease origin "$BRANCH"
            if gh pr view "$BRANCH" --json state --jq .state 2>/dev/null | grep -q OPEN; then
              echo "PR already exists for $BRANCH"
            else
              gh pr create \
                --title "Update CHANGELOG.md for ${VERSION}" \
                --body "Auto-generated changelog update for the ${VERSION} release." \
                --base main \
                --head "$BRANCH" \
                --label internal
            fi
          fi
