name: Web Tooling weekly bump

# Pulls the latest v8/web-tooling-benchmark master SHA, updates the frozen
# corpus pin, and opens a PR. Merge once all pinned workloads remain viable.
#
# Cadence: weekly (Mondays 09:00 UTC). Manual trigger available via
# workflow_dispatch.

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          no-cache: true

      - id: latest
        run: |
          sha=$(gh api repos/v8/web-tooling-benchmark/commits/master --jq .sha)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short=${sha:0:8}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Web Tooling pin
        env:
          WEB_TOOLING_SHA: ${{ steps.latest.outputs.sha }}
        run: bun scripts/web-tooling-bump-pin.ts "$WEB_TOOLING_SHA"

      - id: changed
        env:
          WEB_TOOLING_SHORT: ${{ steps.latest.outputs.short }}
        run: |
          if git diff --quiet -- perf/web-tooling/manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Web Tooling already pinned to ${WEB_TOOLING_SHORT}; no PR to open."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update PR
        if: steps.changed.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/web-tooling-bump
          commit-message: "chore(web-tooling): bump pin to ${{ steps.latest.outputs.short }}"
          title: "chore(web-tooling): bump pin to ${{ steps.latest.outputs.short }}"
          body: |
            Automated bump of the Web Tooling corpus SHA to `${{ steps.latest.outputs.sha }}`.

            CI will run every pinned Web Tooling workload. Review workload
            source changes and the new corpus-version boundary before merging.

            Cron: weekly, Mondays 09:00 UTC. See `.github/workflows/web-tooling-bump.yml`.
          labels: |
            performance
            automated
