name: PR

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install FPC
        run: sudo apt-get update && sudo apt-get install fpc -qq > /dev/null

      - name: Check formatting
        run: ./format.pas --check

      - name: Build all
        run: ./build.pas --prod

      - name: Upload build
        uses: actions/upload-artifact@v5
        with:
          name: build-pr
          retention-days: 1
          path: |
            build/ScriptLoader
            build/TestRunner
            build/BenchmarkRunner
            build/REPL
            build/Goccia.Values.Primitives.Test
            build/Goccia.Values.FunctionValue.Test
            build/Goccia.Values.ObjectValue.Test
            build/Goccia.Compiler.Test
            build/Goccia.Builtins.TestAssertions.Test

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [interpreted, bytecode]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Run all JavaScript tests
        run: ./build/TestRunner tests ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --silent --no-progress --output=test-results-${{ matrix.mode }}.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-${{ matrix.mode }}
          retention-days: 1
          path: test-results-${{ matrix.mode }}.json

      - name: Run Pascal unit tests
        if: matrix.mode == 'interpreted'
        run: |
          ./build/Goccia.Values.Primitives.Test
          ./build/Goccia.Values.FunctionValue.Test
          ./build/Goccia.Values.ObjectValue.Test
          ./build/Goccia.Compiler.Test
          ./build/Goccia.Builtins.TestAssertions.Test

  wasm-test:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run WASM integration tests
        run: node ./tests-wasm/run-wasm-tests.mjs

  benchmark:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [interpreted, bytecode]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Run benchmarks
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: ./build/BenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress --format=json --output=benchmark-${{ matrix.mode }}.json

      - name: Upload results
        uses: actions/upload-artifact@v5
        with:
          name: benchmark-${{ matrix.mode }}
          retention-days: 1
          path: benchmark-${{ matrix.mode }}.json

  benchmark-comment:
    needs: benchmark
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download interpreted results
        uses: actions/download-artifact@v5
        with:
          name: benchmark-interpreted

      - name: Download bytecode results
        uses: actions/download-artifact@v5
        with:
          name: benchmark-bytecode

      - name: Restore interpreted baseline
        uses: actions/cache/restore@v5
        with:
          path: benchmark-interpreted-results.json
          key: benchmark-interpreted-baseline-will-not-match
          restore-keys: benchmark-interpreted-baseline-

      - name: Restore bytecode baseline
        uses: actions/cache/restore@v5
        with:
          path: benchmark-bytecode-results.json
          key: benchmark-bytecode-baseline-will-not-match
          restore-keys: benchmark-bytecode-baseline-

      - name: Check baselines
        run: |
          if [ -f benchmark-interpreted-results.json ]; then
            echo "BASELINE_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "BASELINE_EXISTS=false" >> "$GITHUB_ENV"
          fi
          if [ -f benchmark-bytecode-results.json ]; then
            echo "BYTECODE_BASELINE_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "BYTECODE_BASELINE_EXISTS=false" >> "$GITHUB_ENV"
          fi

      - name: Compare benchmarks and comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const THRESHOLD = 7;

            const fmtOps = (n) => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            const fmtAvg = (changes) => {
              if (changes.length === 0) return '';
              const avg = changes.reduce((a, b) => a + b, 0) / changes.length;
              const sign = avg >= 0 ? '+' : '';
              return `avg ${sign}${avg.toFixed(1)}%`;
            };
            const fmtDelta = (change) => {
              if (change > THRESHOLD) return `🟢 +${change.toFixed(1)}%`;
              if (change < -THRESHOLD) return `🔴 ${change.toFixed(1)}%`;
              return `${change >= 0 ? '+' : ''}${change.toFixed(1)}%`;
            };
            const fmtCell = (baseOps, currentOps) => {
              if (baseOps && baseOps > 0) return `${fmtOps(baseOps)} → ${fmtOps(currentOps)}`;
              return fmtOps(currentOps);
            };
            const classify = (change) => change > THRESHOLD ? 'improved' : change < -THRESHOLD ? 'regressed' : 'unchanged';

            const interpData = JSON.parse(fs.readFileSync('benchmark-interpreted.json', 'utf8'));
            const bytecodeData = JSON.parse(fs.readFileSync('benchmark-bytecode.json', 'utf8'));

            let interpBaseline = null;
            if (process.env.BASELINE_EXISTS === 'true') {
              try { interpBaseline = JSON.parse(fs.readFileSync('benchmark-interpreted-results.json', 'utf8')); }
              catch (e) { console.log('Failed to parse interpreted baseline:', e.message); }
            }
            let bytecodeBaseline = null;
            if (process.env.BYTECODE_BASELINE_EXISTS === 'true') {
              try { bytecodeBaseline = JSON.parse(fs.readFileSync('benchmark-bytecode-results.json', 'utf8')); }
              catch (e) { console.log('Failed to parse bytecode baseline:', e.message); }
            }
            const hasAnyBaseline = interpBaseline || bytecodeBaseline;

            function buildMap(data) {
              const map = {};
              if (!data) return map;
              for (const file of data.files) {
                const m = {};
                for (const b of file.benchmarks) {
                  if (!b.error) m[`${b.suite} > ${b.name}`] = b.opsPerSec;
                }
                map[file.file] = m;
              }
              return map;
            }

            const interpBaseMap = buildMap(interpBaseline);
            const bytecodeBaseMap = buildMap(bytecodeBaseline);
            const bytecodeCurrentMap = buildMap(bytecodeData);

            const newStats = () => ({ improved: 0, regressed: 0, unchanged: 0, new: 0, changes: [] });
            const totals = { interp: newStats(), bytecode: newStats() };
            let totalBenchmarks = 0;
            const fileBlocks = [];

            for (const file of interpData.files) {
              const fileName = file.file;
              const iBase = interpBaseMap[fileName] || {};
              const bBase = bytecodeBaseMap[fileName] || {};
              const bCurrent = bytecodeCurrentMap[fileName] || {};
              const fileS = { interp: newStats(), bytecode: newStats() };
              let fileRows = '';
              const benches = file.benchmarks.filter(b => !b.error);
              totalBenchmarks += benches.length;

              if (hasAnyBaseline) {
                fileRows += '| Benchmark | Interpreted | Δ | Bytecode | Δ |\n';
                fileRows += '|-----------|------------|---|---------|---|\n';
              } else {
                fileRows += '| Benchmark | Interpreted | Bytecode |\n';
                fileRows += '|-----------|------------|----------|\n';
              }

              for (const bench of benches) {
                const key = `${bench.suite} > ${bench.name}`;
                const iOps = bench.opsPerSec;
                const bOps = bCurrent[key];
                const iBaseOps = iBase[key];
                const bBaseOps = bBase[key];

                if (hasAnyBaseline) {
                  let iDelta;
                  if (iBaseOps && iBaseOps > 0) {
                    const c = ((iOps - iBaseOps) / iBaseOps) * 100;
                    fileS.interp.changes.push(c);
                    fileS.interp[classify(c)]++;
                    iDelta = fmtDelta(c);
                  } else {
                    iDelta = '🆕';
                    fileS.interp.new++;
                  }

                  let bDelta;
                  if (bOps != null && bBaseOps && bBaseOps > 0) {
                    const c = ((bOps - bBaseOps) / bBaseOps) * 100;
                    fileS.bytecode.changes.push(c);
                    fileS.bytecode[classify(c)]++;
                    bDelta = fmtDelta(c);
                  } else if (bOps != null) {
                    bDelta = '🆕';
                    fileS.bytecode.new++;
                  } else {
                    bDelta = '—';
                  }

                  fileRows += `| ${bench.name} | ${fmtCell(iBaseOps, iOps)} | ${iDelta} | ${bOps != null ? fmtCell(bBaseOps, bOps) : '—'} | ${bDelta} |\n`;
                } else {
                  fileRows += `| ${bench.name} | ${fmtOps(iOps)} | ${bOps != null ? fmtOps(bOps) : '—'} |\n`;
                }
              }

              for (const mode of ['interp', 'bytecode']) {
                for (const k of ['improved', 'regressed', 'unchanged', 'new']) totals[mode][k] += fileS[mode][k];
                totals[mode].changes.push(...fileS[mode].changes);
              }

              const hasSignificant = fileS.interp.improved + fileS.interp.regressed + fileS.bytecode.improved + fileS.bytecode.regressed > 0;

              function modeSummary(label, s) {
                const p = [];
                if (s.improved > 0) p.push(`🟢 ${s.improved}`);
                if (s.regressed > 0) p.push(`🔴 ${s.regressed}`);
                if (s.new > 0) p.push(`🆕 ${s.new}`);
                if (s.unchanged > 0) p.push(`${s.unchanged} unch.`);
                const avg = fmtAvg(s.changes);
                return `${label}: ${p.length > 0 ? p.join(', ') : `${s.changes.length + s.new}`}${avg ? ` · ${avg}` : ''}`;
              }

              const fileSummary = hasAnyBaseline
                ? modeSummary('Interp', fileS.interp) + ' · ' + modeSummary('Bytecode', fileS.bytecode)
                : `${benches.length} benchmarks`;

              fileBlocks.push({ fileName, fileSummary, fileRows, hasSignificant });
            }

            let body = '## Benchmark Results\n\n';

            if (hasAnyBaseline) {
              function overallMode(label, s) {
                const p = [];
                if (s.improved > 0) p.push(`🟢 ${s.improved} improved`);
                if (s.regressed > 0) p.push(`🔴 ${s.regressed} regressed`);
                if (s.new > 0) p.push(`🆕 ${s.new} new`);
                if (s.unchanged > 0) p.push(`${s.unchanged} unchanged`);
                const avg = fmtAvg(s.changes);
                return `**${label}:** ${p.join(' · ')}${avg ? ` · ${avg}` : ''}`;
              }
              body += `**${totalBenchmarks}** benchmarks\n\n`;
              body += overallMode('Interpreted', totals.interp) + '\\\n';
              body += overallMode('Bytecode', totals.bytecode) + '\n\n';
            } else {
              body += `**${totalBenchmarks}** benchmarks (no baseline)\n\n`;
            }

            for (const block of fileBlocks) {
              const shortName = block.fileName.replace(/^benchmarks\//, '');
              const open = block.hasSignificant ? ' open' : '';
              body += `<details${open}>\n`;
              body += `<summary><strong>${shortName}</strong> — ${block.fileSummary}</summary>\n\n`;
              body += block.fileRows;
              body += `\n</details>\n\n`;
            }

            body += `<sub>Measured on ubuntu-latest x64. Changes within ±${THRESHOLD}% are considered insignificant.</sub>`;

            const marker = '<!-- benchmark-comparison -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  timing-comment:
    needs: [test, benchmark]
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download test results (interpreted)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: test-results-interpreted

      - name: Download test results (bytecode)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: test-results-bytecode

      - name: Download benchmark results (interpreted)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: benchmark-interpreted

      - name: Download benchmark results (bytecode)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: benchmark-bytecode

      - name: Post timing comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tryRead = (p) => { try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return null; } };
            const fmtDur = (ns) => {
              const ms = ns / 1e6;
              if (ms >= 60000) return (ms / 60000).toFixed(2) + 'min';
              if (ms >= 1000) return (ms / 1000).toFixed(2) + 's';
              return ms.toFixed(1) + 'ms';
            };

            const testInterp = tryRead('test-results-interpreted.json');
            const testBytecode = tryRead('test-results-bytecode.json');
            const benchInterp = tryRead('benchmark-interpreted.json');
            const benchBytecode = tryRead('benchmark-bytecode.json');

            if (!testInterp && !testBytecode && !benchInterp && !benchBytecode) {
              console.log('No timing data available');
              return;
            }

            let body = '## Suite Timing\n\n';
            body += '| Suite | Metric | Interpreted | Bytecode |\n';
            body += '|-------|--------|------------|----------|\n';

            if (testInterp || testBytecode) {
              const iTests = testInterp ? testInterp.totalTests : '—';
              const bTests = testBytecode ? testBytecode.totalTests : '—';
              const iPassed = testInterp ? `${testInterp.passed} ✅` : '—';
              const bPassed = testBytecode ? `${testBytecode.passed} ✅` : '—';
              const iFailed = testInterp ? testInterp.failed : 0;
              const bFailed = testBytecode ? testBytecode.failed : 0;
              const iSkipped = testInterp ? testInterp.skipped : 0;
              const bSkipped = testBytecode ? testBytecode.skipped : 0;
              const iDur = testInterp ? fmtDur(testInterp.durationNanoseconds) : '—';
              const bDur = testBytecode ? fmtDur(testBytecode.durationNanoseconds) : '—';
              const iEngine = testInterp ? fmtDur(testInterp.totalEngineNanoseconds) : '—';
              const bEngine = testBytecode ? fmtDur(testBytecode.totalEngineNanoseconds) : '—';

              body += `| Tests | Total | ${iTests} | ${bTests} |\n`;
              body += `| Tests | Passed | ${iPassed} | ${bPassed} |\n`;
              if (iFailed > 0 || bFailed > 0)
                body += `| Tests | Failed | ${iFailed > 0 ? `${iFailed} ❌` : '0'} | ${bFailed > 0 ? `${bFailed} ❌` : '0'} |\n`;
              if (iSkipped > 0 || bSkipped > 0)
                body += `| Tests | Skipped | ${iSkipped} | ${bSkipped} |\n`;
              body += `| Tests | Execution | ${iDur} | ${bDur} |\n`;
              body += `| Tests | Engine | ${iEngine} | ${bEngine} |\n`;
            }

            if (benchInterp || benchBytecode) {
              const iBenchCount = benchInterp ? benchInterp.files.reduce((a, f) => a + f.benchmarks.filter(b => !b.error).length, 0) : '—';
              const bBenchCount = benchBytecode ? benchBytecode.files.reduce((a, f) => a + f.benchmarks.filter(b => !b.error).length, 0) : '—';
              const iBenchDur = benchInterp ? fmtDur(benchInterp.totalDurationNanoseconds) : '—';
              const bBenchDur = benchBytecode ? fmtDur(benchBytecode.totalDurationNanoseconds) : '—';

              body += `| Benchmarks | Total | ${iBenchCount} | ${bBenchCount} |\n`;
              body += `| Benchmarks | Duration | ${iBenchDur} | ${bBenchDur} |\n`;
            }

            body += '\n<sub>Measured on ubuntu-latest x64.</sub>';

            const marker = '<!-- suite-timing -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
