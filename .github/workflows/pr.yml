name: PR

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install FPC
        run: sudo apt-get update && sudo apt-get install fpc -qq > /dev/null

      - name: Check formatting
        run: ./format.pas --check

      - name: Build all
        run: ./build.pas --prod

      - name: Stage build artifacts
        run: bash ./.github/scripts/stage-build-artifacts.sh build pr-artifacts --include-tests

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: build-pr
          retention-days: 1
          path: pr-artifacts/*

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19

      - name: Check doc symbol references
        run: npx tsx scripts/check-doc-symbols.ts

      - name: Check doc duplication
        run: npx tsx scripts/check-doc-duplication.ts

      - name: Check doc file length
        run: npx tsx scripts/check-doc-length.ts

      - name: Check doc links
        run: npx tsx scripts/check-doc-links.ts

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [interpreted, bytecode]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v7
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Build FFI fixture library
        run: ./fixtures/ffi/build.sh

      - name: Run all JavaScript tests
        run: ./build/GocciaTestRunner tests ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --asi --unsafe-ffi --silent --no-progress --output=test-results-${{ matrix.mode }}.json

      - name: Check GocciaTestRunner CLI behaviour
        run: |
          grep -q '"mode": "${{ matrix.mode }}"' test-results-${{ matrix.mode }}.json
          grep -q '"totalFiles":' test-results-${{ matrix.mode }}.json
          grep -q '"jobCount":' test-results-${{ matrix.mode }}.json

      - name: Check GocciaTestRunner coverage CLI
        run: |
          # --coverage prints a summary to stdout
          cov_output="$(./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage 2>&1)"
          printf '%s\n' "$cov_output" | grep -q 'Coverage Summary:'
          printf '%s\n' "$cov_output" | grep -q 'array-creation.js'

          # --coverage-format=lcov --coverage-output writes an lcov file
          ./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=lcov --coverage-output=cov.lcov
          grep -q '^SF:' cov.lcov
          grep -q '^DA:' cov.lcov
          grep -q '^end_of_record' cov.lcov
          rm cov.lcov

          # --coverage-format=json --coverage-output writes a JSON file
          ./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=json --coverage-output=cov.json
          grep -q '"path":' cov.json
          grep -q '"statementMap":' cov.json
          rm cov.json

          # order-independent: --coverage-output before --coverage-format
          ./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-output=cov2.lcov --coverage-format=lcov
          grep -q '^DA:' cov2.lcov
          rm cov2.lcov

          # single-file detail view shows line annotations
          detail_output="$(./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage 2>&1)"
          printf '%s\n' "$detail_output" | grep -Eq '[0-9]+x \|'

          # branch coverage: lcov contains BRDA/BRF entries for branching code
          ./build/GocciaTestRunner tests/language/statements/if/if-else-statements.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=lcov --coverage-output=branch-cov.lcov
          grep -q '^BRDA:' branch-cov.lcov
          grep -q '^BRF:' branch-cov.lcov
          grep -q '^BRH:' branch-cov.lcov
          rm branch-cov.lcov

          # branch coverage: JSON contains branchMap and b entries
          ./build/GocciaTestRunner tests/language/statements/if/if-else-statements.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=json --coverage-output=branch-cov.json
          grep -q '"branchMap":' branch-cov.json
          grep -q '"b":' branch-cov.json
          rm branch-cov.json

      - name: Check --log CLI flag
        run: |
          printf 'console.log("hello"); console.warn("careful");' | ./build/GocciaScriptLoader --asi --log=log-test.txt
          grep -q '\[log\] hello' log-test.txt
          grep -q '\[warn\]' log-test.txt
          rm log-test.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.mode }}
          retention-days: 1
          path: test-results-${{ matrix.mode }}.json

      - name: Run Pascal unit tests
        if: matrix.mode == 'interpreted'
        run: |
          found=0
          for test_bin in build/*.Test build/*.Test.exe; do
            if [ -f "$test_bin" ]; then
              found=1
              "$test_bin"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No Pascal unit test binaries found"
            exit 1
          fi

  benchmark:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [interpreted, bytecode]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v7
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Run benchmarks
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: ./build/GocciaBenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress --format=json --output=benchmark-${{ matrix.mode }}.json

      - name: Check benchmark CLI behaviour
        run: |
          grep -q '"files": \[' benchmark-${{ matrix.mode }}.json
          grep -q '"totalBenchmarks":' benchmark-${{ matrix.mode }}.json
          grep -q '"jobCount":' benchmark-${{ matrix.mode }}.json

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ matrix.mode }}
          retention-days: 1
          path: benchmark-${{ matrix.mode }}.json

  cli:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v7
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      # ── Example smoke tests ──

      - name: Run example scripts
        run: ./build/GocciaScriptLoader examples

      # ── --unsafe-ffi gating ──

      - name: Check --unsafe-ffi gating
        run: |
          # FFI is unavailable without --unsafe-ffi
          ffi_off="$(printf 'typeof FFI;\n' | ./build/GocciaScriptLoader --output=json)"
          printf '%s\n' "$ffi_off" | grep -q '"value":"undefined"'

          # FFI is available with --unsafe-ffi
          ffi_on="$(printf 'typeof FFI;\n' | ./build/GocciaScriptLoader --unsafe-ffi --output=json)"
          printf '%s\n' "$ffi_on" | grep -q '"value":"object"'

      # ── GocciaScriptLoader CLI ──

      - name: Run stdin smoke tests
        run: |
          script_output="$(printf 'const x = 2 + 2;\nx;\n' | ./build/GocciaScriptLoader)"
          printf '%s\n' "$script_output" | grep -q 'Result: 4'

          script_output_bytecode="$(printf 'const x = 2 + 2;\nx;\n' | ./build/GocciaScriptLoader - --mode=bytecode)"
          printf '%s\n' "$script_output_bytecode" | grep -q 'Result: 4'

      - name: Check GocciaScriptLoader CLI behaviour
        run: |
          PYTHON_BIN="$(command -v python3 || command -v python)"

          json_output="$(printf '%s\n' "console.log('hi');" '2 + 2;' | ./build/GocciaScriptLoader --output=json)"
          printf '%s\n' "$json_output" | grep -q '"ok":true'
          printf '%s\n' "$json_output" | grep -q '"value":4'
          printf '%s\n' "$json_output" | grep -Eq '"output":"hi(\\r)?\\n"'

          json_output_bytecode="$(printf '%s\n' "console.log('hi');" '2 + 2;' | ./build/GocciaScriptLoader - --mode=bytecode --output=json)"
          printf '%s\n' "$json_output_bytecode" | grep -q '"ok":true'
          printf '%s\n' "$json_output_bytecode" | grep -q '"value":4'
          printf '%s\n' "$json_output_bytecode" | grep -Eq '"output":"hi(\\r)?\\n"'

          globals_output="$(printf '%s\n' 'x + y;' | ./build/GocciaScriptLoader --global x=10 --global y=20 --output=json)"
          printf '%s\n' "$globals_output" | grep -q '"ok":true'
          printf '%s\n' "$globals_output" | grep -q '"value":30'

          printf '%s\n' '{"name":"goccia"}' > cli-globals.json
          globals_file_output="$(printf '%s\n' 'name;' | ./build/GocciaScriptLoader --globals=cli-globals.json --mode=bytecode --output=json)"
          printf '%s\n' "$globals_file_output" | grep -q '"ok":true'
          printf '%s\n' "$globals_file_output" | grep -q '"value":"goccia"'

          printf '%s\n' '{"name":"file-value"}' > cli-globals.json
          globals_override_output="$(printf '%s\n' 'name;' | ./build/GocciaScriptLoader --globals=cli-globals.json --global name=override --output=json)"
          printf '%s\n' "$globals_override_output" | grep -q '"ok":true'
          printf '%s\n' "$globals_override_output" | grep -q '"value":"override"'

          plain_string_output="$(printf '%s\n' 'name;' | ./build/GocciaScriptLoader --global name=plain-value --output=json)"
          printf '%s\n' "$plain_string_output" | grep -q '"ok":true'
          printf '%s\n' "$plain_string_output" | grep -q '"value":"plain-value"'

          printf '%s\n' 'export const name = "module-value";' > cli-globals-module.js
          globals_module_output="$(printf '%s\n' 'name;' | ./build/GocciaScriptLoader --globals=./cli-globals-module.js --output=json)"
          printf '%s\n' "$globals_module_output" | grep -q '"ok":true'
          printf '%s\n' "$globals_module_output" | grep -q '"value":"module-value"'

          set +e
          timeout_output="$("$PYTHON_BIN" - <<'PY'
          import subprocess
          import sys

          script = 'const iterable = { [Symbol.iterator]: () => ({ next: () => ({ done: false, value: 1 }) }) }; for (const x of iterable) { }' + '\n'
          try:
              result = subprocess.run(
                  ['./build/GocciaScriptLoader', '--timeout=50', '--output=json'],
                  input=script,
                  text=True,
                  capture_output=True,
                  timeout=10,
                  check=False,
              )
          except subprocess.TimeoutExpired:
              sys.exit(124)

          sys.stdout.write(result.stdout)
          sys.stderr.write(result.stderr)
          sys.exit(result.returncode)
          PY
          )"
          timeout_status=$?
          set -e
          test "$timeout_status" -eq 1
          printf '%s\n' "$timeout_output" | grep -q '"ok":false'
          printf '%s\n' "$timeout_output" | grep -q '"type":"TimeoutError"'
          printf '%s\n' "$timeout_output" | grep -q '"message":"Execution timed out after 50ms"'

          set +e
          timeout_output_bytecode="$("$PYTHON_BIN" - <<'PY'
          import subprocess
          import sys

          script = 'const iterable = { [Symbol.iterator]: () => ({ next: () => ({ done: false, value: 1 }) }) }; for (const x of iterable) { }' + '\n'
          try:
              result = subprocess.run(
                  ['./build/GocciaScriptLoader', '-', '--mode=bytecode', '--timeout=50', '--output=json'],
                  input=script,
                  text=True,
                  capture_output=True,
                  timeout=10,
                  check=False,
              )
          except subprocess.TimeoutExpired:
              sys.exit(124)

          sys.stdout.write(result.stdout)
          sys.stderr.write(result.stderr)
          sys.exit(result.returncode)
          PY
          )"
          timeout_status_bytecode=$?
          set -e
          test "$timeout_status_bytecode" -eq 1
          printf '%s\n' "$timeout_output_bytecode" | grep -q '"ok":false'
          printf '%s\n' "$timeout_output_bytecode" | grep -q '"type":"TimeoutError"'
          printf '%s\n' "$timeout_output_bytecode" | grep -q '"message":"Execution timed out after 50ms"'

          set +e
          inslimit_output="$("$PYTHON_BIN" - <<'PY'
          import subprocess
          import sys

          script = 'const iterable = { [Symbol.iterator]: () => ({ next: () => ({ done: false, value: 1 }) }) }; for (const x of iterable) { }' + '\n'
          try:
              result = subprocess.run(
                  ['./build/GocciaScriptLoader', '--max-instructions=500', '--output=json'],
                  input=script,
                  text=True,
                  capture_output=True,
                  timeout=10,
                  check=False,
              )
          except subprocess.TimeoutExpired:
              sys.exit(124)

          sys.stdout.write(result.stdout)
          sys.stderr.write(result.stderr)
          sys.exit(result.returncode)
          PY
          )"
          inslimit_status=$?
          set -e
          test "$inslimit_status" -eq 1
          printf '%s\n' "$inslimit_output" | grep -q '"ok":false'
          printf '%s\n' "$inslimit_output" | grep -q '"type":"InstructionLimitError"'
          printf '%s\n' "$inslimit_output" | grep -q '"message":"Execution exceeded instruction limit of 500"'

          set +e
          inslimit_output_bytecode="$("$PYTHON_BIN" - <<'PY'
          import subprocess
          import sys

          script = 'const iterable = { [Symbol.iterator]: () => ({ next: () => ({ done: false, value: 1 }) }) }; for (const x of iterable) { }' + '\n'
          try:
              result = subprocess.run(
                  ['./build/GocciaScriptLoader', '-', '--mode=bytecode', '--max-instructions=500', '--output=json'],
                  input=script,
                  text=True,
                  capture_output=True,
                  timeout=10,
                  check=False,
              )
          except subprocess.TimeoutExpired:
              sys.exit(124)

          sys.stdout.write(result.stdout)
          sys.stderr.write(result.stderr)
          sys.exit(result.returncode)
          PY
          )"
          inslimit_status_bytecode=$?
          set -e
          test "$inslimit_status_bytecode" -eq 1
          printf '%s\n' "$inslimit_output_bytecode" | grep -q '"ok":false'
          printf '%s\n' "$inslimit_output_bytecode" | grep -q '"type":"InstructionLimitError"'
          printf '%s\n' "$inslimit_output_bytecode" | grep -q '"message":"Execution exceeded instruction limit of 500"'

          set +e
          globals_collision_output="$(printf '%s\n' 'console;' | ./build/GocciaScriptLoader --global console=1 --output=json)"
          globals_collision_status=$?
          set -e
          test "$globals_collision_status" -eq 1
          printf '%s\n' "$globals_collision_output" | grep -q '"ok":false'
          printf '%s\n' "$globals_collision_output" | grep -q 'Cannot override built-in global'

          set +e
          error_output="$(printf '%s\n' "throw new TypeError('boom');" | ./build/GocciaScriptLoader --output=json)"
          error_status=$?
          set -e
          test "$error_status" -eq 1
          printf '%s\n' "$error_output" | grep -q '"ok":false'
          printf '%s\n' "$error_output" | grep -q '"type":"TypeError"'
          printf '%s\n' "$error_output" | grep -q '"message":"boom"'

      - name: Check GocciaScriptLoader --max-memory CLI
        run: |
          # Default ceiling is auto-detected from OS physical memory
          default_output="$(printf 'Goccia.gc.maxBytes;\n' | ./build/GocciaScriptLoader --asi)"
          printf '%s\n' "$default_output" | grep -Eq 'Result: [1-9][0-9]+'

          # Explicit --max-memory overrides the default
          explicit_output="$(printf 'Goccia.gc.maxBytes;\n' | ./build/GocciaScriptLoader --asi --max-memory=5000000)"
          printf '%s\n' "$explicit_output" | grep -q 'Result: 5000000'

          # Exceeding the limit triggers a RangeError (exit code 1)
          set +e
          oom_output="$(printf '%s\n' 'Array.from({length:5000},(_,i)=>({x:i}));' | ./build/GocciaScriptLoader --asi --max-memory=200000 2>&1)"
          oom_status=$?
          set -e
          test "$oom_status" -eq 1
          printf '%s\n' "$oom_output" | grep -q 'RangeError'
          printf '%s\n' "$oom_output" | grep -q 'memory limit'

          # maxBytes is read-only from JS
          set +e
          readonly_output="$(printf 'Goccia.gc.maxBytes = 999;\n' | ./build/GocciaScriptLoader --asi 2>&1)"
          readonly_status=$?
          set -e
          test "$readonly_status" -eq 1
          printf '%s\n' "$readonly_output" | grep -q 'TypeError'

      - name: Check GocciaScriptLoader coverage CLI
        run: |
          # --coverage prints summary
          cov_output="$(printf 'const x = 5;\nx;\n' | ./build/GocciaScriptLoader --coverage 2>&1)"
          printf '%s\n' "$cov_output" | grep -q 'Coverage Summary:'

          # --coverage with --output=json does NOT corrupt JSON stdout
          json_cov_output="$(printf 'const x = 5;\nx;\n' | ./build/GocciaScriptLoader --output=json --coverage 2>&1)"
          printf '%s\n' "$json_cov_output" | head -1 | grep -q '^{'

          # lcov file output
          printf 'const x = 5;\nx;\n' | ./build/GocciaScriptLoader --coverage --coverage-format=lcov --coverage-output=sl-cov.lcov
          grep -q '^SF:' sl-cov.lcov
          grep -q '^DA:' sl-cov.lcov
          rm sl-cov.lcov

          # json file output
          printf 'const x = 5;\nx;\n' | ./build/GocciaScriptLoader --coverage --coverage-format=json --coverage-output=sl-cov.json
          grep -q '"path":' sl-cov.json
          rm sl-cov.json

          # order-independent flags
          printf 'const x = 5;\nx;\n' | ./build/GocciaScriptLoader --coverage --coverage-output=sl-cov2.lcov --coverage-format=lcov
          grep -q '^DA:' sl-cov2.lcov
          rm sl-cov2.lcov

          # bytecode mode coverage
          bytecode_cov="$(printf 'const x = 5;\nx;\n' | ./build/GocciaScriptLoader --mode=bytecode --coverage 2>&1)"
          printf '%s\n' "$bytecode_cov" | grep -q 'Coverage Summary:'

      - name: Check GocciaScriptLoader JSX coverage source map translation
        run: |
          # Create a JSX file with a branch
          cat > /tmp/jsx-cov-test.jsx << 'JSXEOF'
          const createElement = (t, p, ...c) => ({ t, p, c });
          const Greet = (props) => {
            const msg = props.name ? props.name : "world";
            return <div>{msg}</div>;
          };
          Greet({ name: "hi" });
          Greet({});
          JSXEOF

          # Interpreted mode: lcov output uses original JSX line numbers
          ./build/GocciaScriptLoader /tmp/jsx-cov-test.jsx --coverage --coverage-format=lcov --coverage-output=/tmp/jsx-cov.lcov
          grep -q '^SF:/tmp/jsx-cov-test.jsx' /tmp/jsx-cov.lcov
          grep -q '^BRDA:' /tmp/jsx-cov.lcov
          # Branch should reference line 3 (the ternary) — not a transformed line
          grep -q '^BRDA:3,' /tmp/jsx-cov.lcov

          # JSON output also uses original positions
          ./build/GocciaScriptLoader /tmp/jsx-cov-test.jsx --coverage --coverage-format=json --coverage-output=/tmp/jsx-cov.json
          grep -q '"branchMap"' /tmp/jsx-cov.json
          grep -q '"line":3' /tmp/jsx-cov.json

          # Bytecode mode: same translation
          ./build/GocciaScriptLoader /tmp/jsx-cov-test.jsx --mode=bytecode --coverage --coverage-format=lcov --coverage-output=/tmp/jsx-cov-bc.lcov
          grep -q '^BRDA:3,' /tmp/jsx-cov-bc.lcov

          rm -f /tmp/jsx-cov-test.jsx /tmp/jsx-cov.lcov /tmp/jsx-cov.json /tmp/jsx-cov-bc.lcov

      - name: Check GocciaScriptLoader error display
        run: |
          set +e
          error_output="$(printf 'const x = 1\nconst y = 2;\n' | ./build/GocciaScriptLoader 2>&1)"
          error_status=$?
          set -e
          test "$error_status" -eq 1
          printf '%s\n' "$error_output" | grep -q 'SyntaxError'
          printf '%s\n' "$error_output" | grep -q '\^'
          printf '%s\n' "$error_output" | grep -qi 'suggestion'

          set +e
          error_output="$(printf 'const s = "hello;\n' | ./build/GocciaScriptLoader 2>&1)"
          error_status=$?
          set -e
          test "$error_status" -eq 1
          printf '%s\n' "$error_output" | grep -q 'SyntaxError'
          printf '%s\n' "$error_output" | grep -q '\^'

          set +e
          json_error="$(printf 'const x = ;\n' | ./build/GocciaScriptLoader --output=json)"
          json_status=$?
          set -e
          test "$json_status" -eq 1
          printf '%s\n' "$json_error" | grep -q '"ok":false'
          printf '%s\n' "$json_error" | grep -q '"type":"SyntaxError"'
          printf '%s\n' "$json_error" | grep -q '"line":'
          printf '%s\n' "$json_error" | grep -q '"column":'

          set +e
          error_output_bc="$(printf 'const x = 1\n' | ./build/GocciaScriptLoader - --mode=bytecode 2>&1)"
          error_status_bc=$?
          set -e
          test "$error_status_bc" -eq 1
          printf '%s\n' "$error_output_bc" | grep -q 'SyntaxError'

      - name: Check numeric separator rejection
        run: |
          # Trailing separator
          set +e; out="$(printf '1_000_;\n' | ./build/GocciaScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1
          printf '%s\n' "$out" | grep -q 'Numeric separator must be between digits'

          # Leading separator after hex prefix
          set +e; out="$(printf '0x_FF;\n' | ./build/GocciaScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

          # Leading separator after binary prefix
          set +e; out="$(printf '0b_10;\n' | ./build/GocciaScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

          # Leading separator after octal prefix
          set +e; out="$(printf '0o_77;\n' | ./build/GocciaScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

          # Consecutive separators
          set +e; out="$(printf '1__000;\n' | ./build/GocciaScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1
          printf '%s\n' "$out" | grep -q 'Numeric separator must be between digits'

          # Separator after leading 0
          set +e; out="$(printf '0_1;\n' | ./build/GocciaScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1
          printf '%s\n' "$out" | grep -q 'Numeric separator cannot be used after leading 0'

          # Separator before decimal point
          set +e; out="$(printf '1_.5;\n' | ./build/GocciaScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

          # Separator after decimal point
          set +e; out="$(printf '1._5;\n' | ./build/GocciaScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

          # Separator after exponent indicator
          set +e; out="$(printf '1e_10;\n' | ./build/GocciaScriptLoader 2>&1)"; st=$?; set -e
          test "$st" -eq 1

      - name: Check GocciaScriptLoader source map CLI
        run: |
          check_map_json() {
            python3 - "$1" <<'PY'
          import json, sys
          with open(sys.argv[1], 'r', encoding='utf-8') as f:
              data = json.load(f)
          assert data.get('version') == 3, f"bad version: {data.get('version')}"
          assert isinstance(data.get('sources'), list) and len(data['sources']) > 0, "missing sources"
          assert isinstance(data.get('mappings'), str) and data['mappings'] != '', "missing mappings"
          PY
          }

          # Create a JSX test file
          cat > /tmp/sm-test.jsx << 'JSXEOF'
          const createElement = (t, p, ...c) => ({ t, p, c });
          const el = <div id="test">hello</div>;
          el;
          JSXEOF

          # --source-map writes .map file (bytecode mode)
          ./build/GocciaScriptLoader /tmp/sm-test.jsx --source-map --mode=bytecode
          test -f /tmp/sm-test.jsx.map
          check_map_json /tmp/sm-test.jsx.map
          rm /tmp/sm-test.jsx.map

          # --source-map=<path> writes to custom path
          ./build/GocciaScriptLoader /tmp/sm-test.jsx --source-map=/tmp/custom.map --mode=bytecode
          test -f /tmp/custom.map
          check_map_json /tmp/custom.map
          rm /tmp/custom.map

          # --source-map in interpreted mode
          ./build/GocciaScriptLoader /tmp/sm-test.jsx --source-map
          test -f /tmp/sm-test.jsx.map
          check_map_json /tmp/sm-test.jsx.map
          rm /tmp/sm-test.jsx.map

          # No .map file without --source-map
          ./build/GocciaScriptLoader /tmp/sm-test.jsx --mode=bytecode
          test ! -f /tmp/sm-test.jsx.map

          # --source-map without explicit path rejects stdin
          set +e
          out="$(printf 'const x = 1;\n' | ./build/GocciaScriptLoader --source-map 2>&1)"
          st=$?
          set -e
          test "$st" -eq 1
          printf '%s\n' "$out" | grep -q 'required when reading source from stdin'

          rm /tmp/sm-test.jsx

      # ── GocciaBundler CLI ──

      - name: Check GocciaBundler CLI behaviour
        run: |
          # Single file compilation
          printf 'const x = 2 + 2;\nx;\n' > /tmp/bundler-test.js
          bundler_output="$(./build/GocciaBundler /tmp/bundler-test.js 2>&1)"
          test -f /tmp/bundler-test.gbc
          printf '%s\n' "$bundler_output" | grep -q 'Compiling: /tmp/bundler-test.js'
          printf '%s\n' "$bundler_output" | grep -q 'Compiled to /tmp/bundler-test.gbc'

          # Roundtrip: GocciaBundler emits, ScriptLoader runs
          roundtrip_output="$(./build/GocciaScriptLoader /tmp/bundler-test.gbc 2>&1)"
          printf '%s\n' "$roundtrip_output" | grep -q 'Result: 4'
          rm /tmp/bundler-test.gbc

          # Custom --output path
          ./build/GocciaBundler /tmp/bundler-test.js --output=/tmp/custom-output.gbc
          test -f /tmp/custom-output.gbc
          rm /tmp/custom-output.gbc

          # Stdin compilation (--output required)
          printf 'const y = 10;\ny;\n' | ./build/GocciaBundler --output=/tmp/stdin-out.gbc
          test -f /tmp/stdin-out.gbc
          stdin_roundtrip="$(./build/GocciaScriptLoader /tmp/stdin-out.gbc 2>&1)"
          printf '%s\n' "$stdin_roundtrip" | grep -q 'Result: 10'
          rm /tmp/stdin-out.gbc

          # Stdin without --output should fail
          set +e
          printf 'const z = 1;\n' | ./build/GocciaBundler 2>&1
          stdin_no_output_status=$?
          set -e
          test "$stdin_no_output_status" -eq 1

          # Directory compilation
          mkdir -p /tmp/bundler-dir
          printf 'const a = 1;\n' > /tmp/bundler-dir/a.js
          printf 'const b = 2;\n' > /tmp/bundler-dir/b.js
          ./build/GocciaBundler /tmp/bundler-dir
          test -f /tmp/bundler-dir/a.gbc
          test -f /tmp/bundler-dir/b.gbc
          rm -r /tmp/bundler-dir

          # Directory with --output to output directory
          mkdir -p /tmp/bundler-src /tmp/bundler-dist
          printf 'const c = 3;\n' > /tmp/bundler-src/c.js
          ./build/GocciaBundler /tmp/bundler-src --output=/tmp/bundler-dist
          test -f /tmp/bundler-dist/c.gbc
          rm -r /tmp/bundler-src /tmp/bundler-dist

          # Multiple positional files
          printf 'const p = 1;\n' > /tmp/p.js
          printf 'const q = 2;\n' > /tmp/q.js
          ./build/GocciaBundler /tmp/p.js /tmp/q.js
          test -f /tmp/p.gbc
          test -f /tmp/q.gbc
          rm /tmp/p.js /tmp/q.js /tmp/p.gbc /tmp/q.gbc

          # .gbc input should be rejected
          printf 'const r = 1;\n' > /tmp/reject.js
          ./build/GocciaBundler /tmp/reject.js
          set +e
          ./build/GocciaBundler /tmp/reject.gbc 2>&1
          gbc_status=$?
          set -e
          test "$gbc_status" -eq 1
          rm /tmp/reject.js /tmp/reject.gbc

          # --help
          help_output="$(./build/GocciaBundler --help 2>&1)"
          printf '%s\n' "$help_output" | grep -q '\-\-output'
          printf '%s\n' "$help_output" | grep -q '\-\-source-map'
          printf '%s\n' "$help_output" | grep -q '\-\-asi'
          printf '%s\n' "$help_output" | grep -q '\-\-jobs'

          rm /tmp/bundler-test.js

      - name: Check GocciaBundler source map CLI
        run: |
          check_map_json() {
            python3 - "$1" <<'PY'
          import json, sys
          with open(sys.argv[1], 'r', encoding='utf-8') as f:
              data = json.load(f)
          assert data.get('version') == 3, f"bad version: {data.get('version')}"
          assert isinstance(data.get('sources'), list) and len(data['sources']) > 0, "missing sources"
          assert isinstance(data.get('mappings'), str) and data['mappings'] != '', "missing mappings"
          PY
          }

          # Create a JSX test file
          cat > /tmp/bundler-sm.jsx << 'JSXEOF'
          const createElement = (t, p, ...c) => ({ t, p, c });
          const el = <div id="test">hello</div>;
          el;
          JSXEOF

          # --source-map writes .map file alongside .gbc
          ./build/GocciaBundler /tmp/bundler-sm.jsx --source-map
          test -f /tmp/bundler-sm.gbc
          test -f /tmp/bundler-sm.jsx.map
          check_map_json /tmp/bundler-sm.jsx.map
          rm /tmp/bundler-sm.gbc /tmp/bundler-sm.jsx.map

          # --source-map=<path> writes to custom path
          ./build/GocciaBundler /tmp/bundler-sm.jsx --source-map=/tmp/bundler-custom.map
          test -f /tmp/bundler-sm.gbc
          test -f /tmp/bundler-custom.map
          check_map_json /tmp/bundler-custom.map
          rm /tmp/bundler-sm.gbc /tmp/bundler-custom.map

          # No .map file without --source-map
          ./build/GocciaBundler /tmp/bundler-sm.jsx
          test -f /tmp/bundler-sm.gbc
          test ! -f /tmp/bundler-sm.jsx.map
          rm /tmp/bundler-sm.gbc

          # --source-map from stdin derives map path from --output
          cat > /tmp/bundler-stdin-sm.jsx << 'JSXEOF'
          const createElement = (t, p, ...c) => ({ t, p, c });
          const el = <div id="test">hello</div>;
          el;
          JSXEOF
          cat /tmp/bundler-stdin-sm.jsx | ./build/GocciaBundler --output=/tmp/sm-stdin.gbc --source-map
          test -f /tmp/sm-stdin.gbc
          test -f /tmp/sm-stdin.gbc.map
          check_map_json /tmp/sm-stdin.gbc.map
          rm /tmp/sm-stdin.gbc /tmp/sm-stdin.gbc.map /tmp/bundler-stdin-sm.jsx

          rm /tmp/bundler-sm.jsx

      # ── GocciaBenchmarkRunner CLI ──

      - name: Check GocciaBenchmarkRunner CLI behaviour
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: |
          ./build/GocciaBenchmarkRunner benchmarks/fibonacci.js --no-progress --format=json --output=benchmark-file.json
          grep -q '"file": "benchmarks/fibonacci.js"' benchmark-file.json
          grep -q '"totalBenchmarks":' benchmark-file.json

          printf 'suite("stdin", () => {\n  bench("sum", {\n    run: () => 1 + 1,\n  });\n});\n' | \
            ./build/GocciaBenchmarkRunner --no-progress --format=json --output=benchmark-stdin.json
          grep -q '"files": \[' benchmark-stdin.json
          grep -q '"name": "sum"' benchmark-stdin.json
          grep -q '"totalBenchmarks": 1' benchmark-stdin.json

          ./build/GocciaBenchmarkRunner benchmarks/fibonacci.js --mode=bytecode --no-progress --format=json --output=benchmark-file-bytecode.json
          grep -q '"file": "benchmarks/fibonacci.js"' benchmark-file-bytecode.json
          grep -q '"totalBenchmarks":' benchmark-file-bytecode.json

          printf 'suite("stdin", () => {\n  bench("sum", {\n    run: () => 1 + 1,\n  });\n});\n' | \
            ./build/GocciaBenchmarkRunner - --mode=bytecode --no-progress --format=json --output=benchmark-stdin-bytecode.json
          grep -q '"files": \[' benchmark-stdin-bytecode.json
          grep -q '"name": "sum"' benchmark-stdin-bytecode.json
          grep -q '"totalBenchmarks": 1' benchmark-stdin-bytecode.json

      # ── Config file loading (goccia.json / .json5 / .toml) ──

      - name: Check goccia.json config file loading
        run: |
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          # goccia.json enables ASI and bytecode mode
          printf '{"asi": true, "mode": "bytecode"}\n' > "$cfg_dir/goccia.json"
          printf 'const x = 2 + 2\nx\n' > "$cfg_dir/test.js"

          # Config discovered from entry file's directory (not cwd)
          output="$(./build/GocciaScriptLoader "$cfg_dir/test.js" 2>&1)"
          printf '%s\n' "$output" | grep -q '(bytecode)'
          printf '%s\n' "$output" | grep -q 'Result: 4'

          # CLI --mode=interpreted overrides config file
          override_output="$(./build/GocciaScriptLoader "$cfg_dir/test.js" --mode=interpreted 2>&1)"
          printf '%s\n' "$override_output" | grep -q '(interpreted)'

      - name: Check goccia.toml config file loading
        run: |
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          printf 'asi = true\nmode = "bytecode"\n' > "$cfg_dir/goccia.toml"
          printf 'const x = 10\nx\n' > "$cfg_dir/test.js"

          output="$(./build/GocciaScriptLoader "$cfg_dir/test.js" 2>&1)"
          printf '%s\n' "$output" | grep -q '(bytecode)'
          printf '%s\n' "$output" | grep -q 'Result: 10'

      - name: Check goccia.json5 config file loading
        run: |
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          printf '{asi: true, mode: "bytecode"}\n' > "$cfg_dir/goccia.json5"
          printf 'const x = 10\nx\n' > "$cfg_dir/test.js"

          output="$(./build/GocciaScriptLoader "$cfg_dir/test.js" 2>&1)"
          printf '%s\n' "$output" | grep -q '(bytecode)'
          printf '%s\n' "$output" | grep -q 'Result: 10'

      - name: Check config file priority (JSON5 > JSON)
        run: |
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          printf '{"mode": "interpreted", "asi": true}\n' > "$cfg_dir/goccia.json"
          printf '{asi: true, mode: "bytecode"}\n' > "$cfg_dir/goccia.json5"
          printf 'const x = 1\nx\n' > "$cfg_dir/test.js"

          output="$(./build/GocciaScriptLoader "$cfg_dir/test.js" 2>&1)"
          printf '%s\n' "$output" | grep -q '(bytecode)'

      - name: Check config file priority (TOML > JSON5 > JSON)
        run: |
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          # All three present — TOML should win
          printf '{"mode": "interpreted", "asi": true}\n' > "$cfg_dir/goccia.json"
          printf '{asi: true, mode: "interpreted"}\n' > "$cfg_dir/goccia.json5"
          printf 'asi = true\nmode = "bytecode"\n' > "$cfg_dir/goccia.toml"
          printf 'const x = 1\nx\n' > "$cfg_dir/test.js"

          output="$(./build/GocciaScriptLoader "$cfg_dir/test.js" 2>&1)"
          printf '%s\n' "$output" | grep -q '(bytecode)'

      - name: Check config file discovered from entry file directory
        run: |
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          mkdir -p "$cfg_dir/src"
          printf '{"asi": true, "mode": "bytecode"}\n' > "$cfg_dir/goccia.json"
          printf 'const x = 7\nx\n' > "$cfg_dir/src/test.js"

          # Run from repo root — config is still found via entry file path
          output="$(./build/GocciaScriptLoader "$cfg_dir/src/test.js" 2>&1)"
          printf '%s\n' "$output" | grep -q '(bytecode)'
          printf '%s\n' "$output" | grep -q 'Result: 7'

      - name: Check config file with timeout option
        run: |
          PYTHON_BIN="$(command -v python3 || command -v python)"
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          printf '{"timeout": 50}\n' > "$cfg_dir/goccia.json"
          printf '%s\n' 'const iterable = { [Symbol.iterator]: () => ({ next: () => ({ done: false, value: 1 }) }) }; for (const x of iterable) { }' > "$cfg_dir/test.js"

          set +e
          timeout_output="$("$PYTHON_BIN" - "$cfg_dir" <<'PY'
          import subprocess, sys
          cfg_dir = sys.argv[1]
          try:
              result = subprocess.run(
                  ['./build/GocciaScriptLoader', cfg_dir + '/test.js', '--output=json'],
                  text=True, capture_output=True, timeout=10, check=False,
              )
          except subprocess.TimeoutExpired:
              sys.exit(124)
          sys.stdout.write(result.stdout)
          sys.exit(result.returncode)
          PY
          )"
          timeout_status=$?
          set -e
          test "$timeout_status" -eq 1
          printf '%s\n' "$timeout_output" | grep -q '"ok":false'
          printf '%s\n' "$timeout_output" | grep -q 'TimeoutError'

      - name: Check config file without imports field
        run: |
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          # Config file with only CLI options (no imports) should not error
          printf '{"asi": true}\n' > "$cfg_dir/goccia.json"
          printf 'const x = 42\nx\n' > "$cfg_dir/test.js"

          output="$(./build/GocciaScriptLoader "$cfg_dir/test.js" 2>&1)"
          printf '%s\n' "$output" | grep -q 'Result: 42'

      - name: Check config file with imports coexists with CLI options
        run: |
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          mkdir -p "$cfg_dir/lib"
          printf 'export const value = 99;\n' > "$cfg_dir/lib/utils.js"
          printf '{"asi": true, "imports": {"utils": "./lib/utils.js"}}\n' > "$cfg_dir/goccia.json"
          printf 'import { value } from "utils"\nvalue\n' > "$cfg_dir/test.js"

          output="$(cd "$cfg_dir" && "$OLDPWD/build/GocciaScriptLoader" test.js 2>&1)"
          printf '%s\n' "$output" | grep -q 'Result: 99'

      - name: Check config file extends
        run: |
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          # Base config with ASI
          printf '{"asi": true}\n' > "$cfg_dir/base.json"

          # Child config extends base, adds bytecode mode
          printf '{"extends": "base.json", "mode": "bytecode"}\n' > "$cfg_dir/goccia.json"
          printf 'const x = 5\nx\n' > "$cfg_dir/test.js"

          output="$(./build/GocciaScriptLoader "$cfg_dir/test.js" 2>&1)"
          printf '%s\n' "$output" | grep -q '(bytecode)'
          printf '%s\n' "$output" | grep -q 'Result: 5'

      - name: Check config file extends from subdirectory
        run: |
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          mkdir -p "$cfg_dir/tests/asi"

          # Root config with ASI
          printf '{"asi": true}\n' > "$cfg_dir/goccia.json"

          # Subdirectory config extends root
          printf '{"extends": "../../goccia.json", "mode": "bytecode"}\n' > "$cfg_dir/tests/asi/goccia.json"
          printf 'const x = 99\nx\n' > "$cfg_dir/tests/asi/test.js"

          output="$(./build/GocciaScriptLoader "$cfg_dir/tests/asi/test.js" 2>&1)"
          printf '%s\n' "$output" | grep -q '(bytecode)'
          printf '%s\n' "$output" | grep -q 'Result: 99'

      - name: Check TestRunner respects config file
        run: |
          cfg_dir="$(mktemp -d)"
          trap 'rm -rf "$cfg_dir"' EXIT

          printf '{"asi": true, "mode": "bytecode"}\n' > "$cfg_dir/goccia.json"
          cat > "$cfg_dir/test.js" << 'EOF'
          describe("config", () => {
            test("works", () => {
              expect(2 + 2).toBe(4)
            })
          })
          EOF

          output="$(cd "$cfg_dir" && "$OLDPWD/build/GocciaTestRunner" test.js --no-progress --output=results.json 2>&1)"
          grep -q '"mode": "bytecode"' "$cfg_dir/results.json"
          grep -q '"passed": 1' "$cfg_dir/results.json"

  benchmark-comment:
    needs: benchmark
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download interpreted results
        uses: actions/download-artifact@v7
        with:
          name: benchmark-interpreted

      - name: Download bytecode results
        uses: actions/download-artifact@v7
        with:
          name: benchmark-bytecode

      - name: Restore interpreted baseline
        uses: actions/cache/restore@v5
        with:
          path: benchmark-interpreted-results.json
          key: benchmark-interpreted-baseline-will-not-match
          restore-keys: benchmark-interpreted-baseline-

      - name: Restore bytecode baseline
        uses: actions/cache/restore@v5
        with:
          path: benchmark-bytecode-results.json
          key: benchmark-bytecode-baseline-will-not-match
          restore-keys: benchmark-bytecode-baseline-

      - name: Check baselines
        run: |
          if [ -f benchmark-interpreted-results.json ]; then
            echo "BASELINE_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "BASELINE_EXISTS=false" >> "$GITHUB_ENV"
          fi
          if [ -f benchmark-bytecode-results.json ]; then
            echo "BYTECODE_BASELINE_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "BYTECODE_BASELINE_EXISTS=false" >> "$GITHUB_ENV"
          fi

      - name: Compare benchmarks and comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const fmtOps = (n) => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            const fmtPercent = (change) => {
              if (change == null) return 'N/A';
              return `${change >= 0 ? '+' : ''}${change.toFixed(1)}%`;
            };
            const fmtAvg = (changes) => {
              if (changes.length === 0) return '';
              const avg = changes.reduce((a, b) => a + b, 0) / changes.length;
              return `avg ${fmtPercent(avg)}`;
            };
            const fmtDelta = (classification, change) => {
              if (change == null) return classification === 'new' ? '🆕' : 'N/A';
              if (classification === 'improved') return `🟢 ${fmtPercent(change)}`;
              if (classification === 'regressed') return `🔴 ${fmtPercent(change)}`;
              if (classification === 'unchanged') return `~ overlap (${fmtPercent(change)})`;
              return '🆕';
            };
            const fmtRange = (entry) => {
              if (!entry) return '—';
              if (entry.minOpsPerSec === entry.maxOpsPerSec) return fmtOps(entry.opsPerSec);
              return `${fmtOps(entry.minOpsPerSec)}..${fmtOps(entry.maxOpsPerSec)}`;
            };
            const fmtBenchmark = (entry) => {
              if (!entry) return '—';
              if (entry.minOpsPerSec === entry.maxOpsPerSec) return `${fmtOps(entry.opsPerSec)} ops/sec`;
              return `${fmtOps(entry.opsPerSec)} ops/sec [${fmtRange(entry)}]`;
            };
            const fmtCell = (baseEntry, currentEntry) => {
              if (baseEntry) return `${fmtBenchmark(baseEntry)} → ${fmtBenchmark(currentEntry)}`;
              return fmtBenchmark(currentEntry);
            };
            const normalizeBenchmark = (benchmark) => ({
              opsPerSec: benchmark.opsPerSec,
              minOpsPerSec: benchmark.minOpsPerSec ?? benchmark.opsPerSec,
              maxOpsPerSec: benchmark.maxOpsPerSec ?? benchmark.opsPerSec,
              variancePercentage: benchmark.variancePercentage ?? 0,
            });
            const calculateChange = (baseEntry, currentEntry) => {
              if (!baseEntry || !baseEntry.opsPerSec) return null;
              return ((currentEntry.opsPerSec - baseEntry.opsPerSec) / baseEntry.opsPerSec) * 100;
            };
            const classify = (baseEntry, currentEntry) => {
              if (!baseEntry) return 'new';
              if (currentEntry.minOpsPerSec > baseEntry.maxOpsPerSec) return 'improved';
              if (currentEntry.maxOpsPerSec < baseEntry.minOpsPerSec) return 'regressed';
              return 'unchanged';
            };

            const interpData = JSON.parse(fs.readFileSync('benchmark-interpreted.json', 'utf8'));
            const bytecodeData = JSON.parse(fs.readFileSync('benchmark-bytecode.json', 'utf8'));

            let interpBaseline = null;
            if (process.env.BASELINE_EXISTS === 'true') {
              try { interpBaseline = JSON.parse(fs.readFileSync('benchmark-interpreted-results.json', 'utf8')); }
              catch (e) { console.log('Failed to parse interpreted baseline:', e.message); }
            }
            let bytecodeBaseline = null;
            if (process.env.BYTECODE_BASELINE_EXISTS === 'true') {
              try { bytecodeBaseline = JSON.parse(fs.readFileSync('benchmark-bytecode-results.json', 'utf8')); }
              catch (e) { console.log('Failed to parse bytecode baseline:', e.message); }
            }
            const hasAnyBaseline = interpBaseline || bytecodeBaseline;

            function buildMap(data) {
              const map = {};
              if (!data) return map;
              for (const file of data.files) {
                const m = {};
                for (const b of file.benchmarks) {
                  if (!b.error) m[`${b.suite} > ${b.name}`] = normalizeBenchmark(b);
                }
                map[file.file] = m;
              }
              return map;
            }

            const interpBaseMap = buildMap(interpBaseline);
            const bytecodeBaseMap = buildMap(bytecodeBaseline);
            const bytecodeCurrentMap = buildMap(bytecodeData);

            const newStats = () => ({ improved: 0, regressed: 0, unchanged: 0, new: 0, changes: [] });
            const totals = { interp: newStats(), bytecode: newStats() };
            let totalBenchmarks = 0;
            const fileBlocks = [];

            for (const file of interpData.files) {
              const fileName = file.file;
              const iBase = interpBaseMap[fileName] || {};
              const bBase = bytecodeBaseMap[fileName] || {};
              const bCurrent = bytecodeCurrentMap[fileName] || {};
              const fileS = { interp: newStats(), bytecode: newStats() };
              let fileRows = '';
              const benches = file.benchmarks.filter(b => !b.error);
              totalBenchmarks += benches.length;

              if (hasAnyBaseline) {
                fileRows += '| Benchmark | Interpreted | Δ | Bytecode | Δ |\n';
                fileRows += '|-----------|------------|---|---------|---|\n';
              } else {
                fileRows += '| Benchmark | Interpreted | Bytecode |\n';
                fileRows += '|-----------|------------|----------|\n';
              }

              for (const bench of benches) {
                const key = `${bench.suite} > ${bench.name}`;
                const iCurrent = normalizeBenchmark(bench);
                const bCurrentEntry = bCurrent[key];
                const iBaseEntry = iBase[key];
                const bBaseEntry = bBase[key];

                if (hasAnyBaseline) {
                  let iDelta;
                  if (iBaseEntry) {
                    const c = calculateChange(iBaseEntry, iCurrent);
                    const classification = classify(iBaseEntry, iCurrent);
                    if (c != null) fileS.interp.changes.push(c);
                    fileS.interp[classification]++;
                    iDelta = fmtDelta(classification, c);
                  } else {
                    iDelta = '🆕';
                    fileS.interp.new++;
                  }

                  let bDelta;
                  if (bCurrentEntry && bBaseEntry) {
                    const c = calculateChange(bBaseEntry, bCurrentEntry);
                    const classification = classify(bBaseEntry, bCurrentEntry);
                    if (c != null) fileS.bytecode.changes.push(c);
                    fileS.bytecode[classification]++;
                    bDelta = fmtDelta(classification, c);
                  } else if (bCurrentEntry) {
                    bDelta = '🆕';
                    fileS.bytecode.new++;
                  } else {
                    bDelta = '—';
                  }

                  fileRows += `| ${bench.name} | ${fmtCell(iBaseEntry, iCurrent)} | ${iDelta} | ${bCurrentEntry ? fmtCell(bBaseEntry, bCurrentEntry) : '—'} | ${bDelta} |\n`;
                } else {
                  fileRows += `| ${bench.name} | ${fmtRange(iCurrent)} | ${bCurrentEntry ? fmtRange(bCurrentEntry) : '—'} |\n`;
                }
              }

              for (const mode of ['interp', 'bytecode']) {
                for (const k of ['improved', 'regressed', 'unchanged', 'new']) totals[mode][k] += fileS[mode][k];
                totals[mode].changes.push(...fileS[mode].changes);
              }

              const hasSignificant = fileS.interp.improved + fileS.interp.regressed + fileS.bytecode.improved + fileS.bytecode.regressed > 0;

              function modeSummary(label, s) {
                const p = [];
                if (s.improved > 0) p.push(`🟢 ${s.improved}`);
                if (s.regressed > 0) p.push(`🔴 ${s.regressed}`);
                if (s.new > 0) p.push(`🆕 ${s.new}`);
                if (s.unchanged > 0) p.push(`${s.unchanged} unch.`);
                const avg = fmtAvg(s.changes);
                return `${label}: ${p.length > 0 ? p.join(', ') : `${s.changes.length + s.new}`}${avg ? ` · ${avg}` : ''}`;
              }

              const fileSummary = hasAnyBaseline
                ? modeSummary('Interp', fileS.interp) + ' · ' + modeSummary('Bytecode', fileS.bytecode)
                : `${benches.length} benchmarks`;

              fileBlocks.push({ fileName, fileSummary, fileRows, hasSignificant });
            }

            let body = '## Benchmark Results\n\n';

            if (hasAnyBaseline) {
              function overallMode(label, s) {
                const p = [];
                if (s.improved > 0) p.push(`🟢 ${s.improved} improved`);
                if (s.regressed > 0) p.push(`🔴 ${s.regressed} regressed`);
                if (s.new > 0) p.push(`🆕 ${s.new} new`);
                if (s.unchanged > 0) p.push(`${s.unchanged} unchanged`);
                const avg = fmtAvg(s.changes);
                return `**${label}:** ${p.join(' · ')}${avg ? ` · ${avg}` : ''}`;
              }
              body += `**${totalBenchmarks}** benchmarks\n\n`;
              body += overallMode('Interpreted', totals.interp) + '\\\n';
              body += overallMode('Bytecode', totals.bytecode) + '\n\n';
            } else {
              body += `**${totalBenchmarks}** benchmarks (no baseline)\n\n`;
            }

            for (const block of fileBlocks) {
              const shortName = block.fileName.replace(/^benchmarks\//, '');
              const open = block.hasSignificant ? ' open' : '';
              body += `<details${open}>\n`;
              body += `<summary><strong>${shortName}</strong> — ${block.fileSummary}</summary>\n\n`;
              body += block.fileRows;
              body += `\n</details>\n\n`;
            }

            body += '<sub>Measured on ubuntu-latest x64. Benchmark ranges compare cached main-branch min/max ops/sec with the PR run; overlapping ranges are treated as unchanged noise. Percentage deltas are secondary context.</sub>';

            const marker = '<!-- benchmark-comparison -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  timing-comment:
    needs: [test, benchmark]
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download test results (interpreted)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: test-results-interpreted

      - name: Download test results (bytecode)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: test-results-bytecode

      - name: Download benchmark results (interpreted)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: benchmark-interpreted

      - name: Download benchmark results (bytecode)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: benchmark-bytecode

      - name: Post timing comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tryRead = (p) => { try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return null; } };
            const fmtDur = (ns) => {
              const ms = ns / 1e6;
              if (ms >= 60000) return (ms / 60000).toFixed(2) + 'min';
              if (ms >= 1000) return (ms / 1000).toFixed(2) + 's';
              return ms.toFixed(1) + 'ms';
            };

            const testInterp = tryRead('test-results-interpreted.json');
            const testBytecode = tryRead('test-results-bytecode.json');
            const benchInterp = tryRead('benchmark-interpreted.json');
            const benchBytecode = tryRead('benchmark-bytecode.json');

            if (!testInterp && !testBytecode && !benchInterp && !benchBytecode) {
              console.log('No timing data available');
              return;
            }

            let body = '## Suite Timing\n\n';
            body += '| Suite | Metric | Interpreted | Bytecode |\n';
            body += '|-------|--------|------------|----------|\n';

            if (testInterp || testBytecode) {
              const iTests = testInterp ? testInterp.totalTests : '—';
              const bTests = testBytecode ? testBytecode.totalTests : '—';
              const iPassed = testInterp ? `${testInterp.passed} ✅` : '—';
              const bPassed = testBytecode ? `${testBytecode.passed} ✅` : '—';
              const iFailed = testInterp ? testInterp.failed : 0;
              const bFailed = testBytecode ? testBytecode.failed : 0;
              const iSkipped = testInterp ? testInterp.skipped : 0;
              const bSkipped = testBytecode ? testBytecode.skipped : 0;
              const iDur = testInterp ? fmtDur(testInterp.durationNanoseconds) : '—';
              const bDur = testBytecode ? fmtDur(testBytecode.durationNanoseconds) : '—';
              const iJobs = testInterp ? (testInterp.jobCount || 1) : 1;
              const bJobs = testBytecode ? (testBytecode.jobCount || 1) : 1;
              const isParallel = iJobs > 1 || bJobs > 1;
              const timingLabel = isParallel ? ' (cumulative)' : '';
              const iLex = testInterp ? fmtDur(testInterp.lexTimeNanoseconds) : '—';
              const bLex = testBytecode ? fmtDur(testBytecode.lexTimeNanoseconds) : '—';
              const iParse = testInterp ? fmtDur(testInterp.parseTimeNanoseconds) : '—';
              const bParse = testBytecode ? fmtDur(testBytecode.parseTimeNanoseconds) : '—';
              const bCompile = testBytecode ? fmtDur(testBytecode.compileTimeNanoseconds) : '—';
              const iExec = testInterp ? fmtDur(testInterp.executeTimeNanoseconds) : '—';
              const bExec = testBytecode ? fmtDur(testBytecode.executeTimeNanoseconds) : '—';
              const iEngine = testInterp ? fmtDur(testInterp.totalEngineNanoseconds) : '—';
              const bEngine = testBytecode ? fmtDur(testBytecode.totalEngineNanoseconds) : '—';

              body += `| Tests | Total | ${iTests} | ${bTests} |\n`;
              body += `| Tests | Passed | ${iPassed} | ${bPassed} |\n`;
              if (iFailed > 0 || bFailed > 0)
                body += `| Tests | Failed | ${iFailed > 0 ? `${iFailed} ❌` : '0'} | ${bFailed > 0 ? `${bFailed} ❌` : '0'} |\n`;
              if (iSkipped > 0 || bSkipped > 0)
                body += `| Tests | Skipped | ${iSkipped} | ${bSkipped} |\n`;
              if (isParallel)
                body += `| Tests | Workers | ${iJobs} | ${bJobs} |\n`;
              body += `| Tests | Test Duration | ${iDur} | ${bDur} |\n`;
              body += `| Tests | Lex${timingLabel} | ${iLex} | ${bLex} |\n`;
              body += `| Tests | Parse${timingLabel} | ${iParse} | ${bParse} |\n`;
              body += `| Tests | Compile${timingLabel} | — | ${bCompile} |\n`;
              body += `| Tests | Execute${timingLabel} | ${iExec} | ${bExec} |\n`;
              body += `| Tests | Engine Total${timingLabel} | ${iEngine} | ${bEngine} |\n`;
              if (isParallel) {
                const fmtAvg = (ns, jobs) => jobs > 1 ? fmtDur(ns / jobs) : '—';
                const iAvgLex = testInterp && iJobs > 1 ? fmtAvg(testInterp.lexTimeNanoseconds, iJobs) : '—';
                const bAvgLex = testBytecode && bJobs > 1 ? fmtAvg(testBytecode.lexTimeNanoseconds, bJobs) : '—';
                const iAvgParse = testInterp && iJobs > 1 ? fmtAvg(testInterp.parseTimeNanoseconds, iJobs) : '—';
                const bAvgParse = testBytecode && bJobs > 1 ? fmtAvg(testBytecode.parseTimeNanoseconds, bJobs) : '—';
                const bAvgCompile = testBytecode && bJobs > 1 ? fmtAvg(testBytecode.compileTimeNanoseconds, bJobs) : '—';
                const iAvgExec = testInterp && iJobs > 1 ? fmtAvg(testInterp.executeTimeNanoseconds, iJobs) : '—';
                const bAvgExec = testBytecode && bJobs > 1 ? fmtAvg(testBytecode.executeTimeNanoseconds, bJobs) : '—';
                const iAvgEngine = testInterp && iJobs > 1 ? fmtAvg(testInterp.totalEngineNanoseconds, iJobs) : '—';
                const bAvgEngine = testBytecode && bJobs > 1 ? fmtAvg(testBytecode.totalEngineNanoseconds, bJobs) : '—';
                body += `| Tests | Lex (avg/worker) | ${iAvgLex} | ${bAvgLex} |\n`;
                body += `| Tests | Parse (avg/worker) | ${iAvgParse} | ${bAvgParse} |\n`;
                body += `| Tests | Compile (avg/worker) | — | ${bAvgCompile} |\n`;
                body += `| Tests | Execute (avg/worker) | ${iAvgExec} | ${bAvgExec} |\n`;
                body += `| Tests | Engine Total (avg/worker) | ${iAvgEngine} | ${bAvgEngine} |\n`;
              }
            }

            if (benchInterp || benchBytecode) {
              const iBenchCount = benchInterp ? benchInterp.files.reduce((a, f) => a + f.benchmarks.filter(b => !b.error).length, 0) : '—';
              const bBenchCount = benchBytecode ? benchBytecode.files.reduce((a, f) => a + f.benchmarks.filter(b => !b.error).length, 0) : '—';
              const iBenchDur = benchInterp ? fmtDur(benchInterp.totalDurationNanoseconds) : '—';
              const bBenchDur = benchBytecode ? fmtDur(benchBytecode.totalDurationNanoseconds) : '—';
              const iBenchJobs = benchInterp ? (benchInterp.jobCount || 1) : 1;
              const bBenchJobs = benchBytecode ? (benchBytecode.jobCount || 1) : 1;
              const benchParallel = iBenchJobs > 1 || bBenchJobs > 1;

              body += `| Benchmarks | Total | ${iBenchCount} | ${bBenchCount} |\n`;
              if (benchParallel)
                body += `| Benchmarks | Workers | ${iBenchJobs} | ${bBenchJobs} |\n`;
              body += `| Benchmarks | Duration | ${iBenchDur} | ${bBenchDur} |\n`;
            }

            body += '\n<sub>Measured on ubuntu-latest x64.</sub>';

            const marker = '<!-- suite-timing -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
