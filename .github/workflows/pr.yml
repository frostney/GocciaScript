name: PR

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install FPC
        run: sudo apt-get update && sudo apt-get install fpc -qq > /dev/null

      - name: Check formatting
        run: ./format.pas --check

      - name: Build all
        run: ./build.pas --prod

      - name: Stage build artifacts
        run: bash ./.github/scripts/stage-build-artifacts.sh build pr-artifacts --include-tests

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: build-pr
          retention-days: 1
          path: pr-artifacts/*

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19

      - name: Check doc symbol references
        run: npx tsx scripts/check-doc-symbols.ts

      - name: Check doc duplication
        run: npx tsx scripts/check-doc-duplication.ts

      - name: Check doc file length
        run: npx tsx scripts/check-doc-length.ts

      - name: Check doc links
        run: npx tsx scripts/check-doc-links.ts

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [interpreted, bytecode]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v7
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Build FFI fixture library
        run: ./fixtures/ffi/build.sh

      - name: Run all JavaScript tests
        run: ./build/GocciaTestRunner tests ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --asi --unsafe-ffi --silent --no-progress --output=test-results-${{ matrix.mode }}.json

      - name: Check GocciaTestRunner CLI behaviour
        run: |
          grep -q '"mode": "${{ matrix.mode }}"' test-results-${{ matrix.mode }}.json
          grep -q '"totalFiles":' test-results-${{ matrix.mode }}.json
          grep -q '"jobCount":' test-results-${{ matrix.mode }}.json

      - name: Check GocciaTestRunner coverage CLI
        run: |
          # --coverage prints a summary to stdout
          cov_output="$(./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage 2>&1)"
          printf '%s\n' "$cov_output" | grep -q 'Coverage Summary:'
          printf '%s\n' "$cov_output" | grep -q 'array-creation.js'

          # --coverage-format=lcov --coverage-output writes an lcov file
          ./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=lcov --coverage-output=cov.lcov
          grep -q '^SF:' cov.lcov
          grep -q '^DA:' cov.lcov
          grep -q '^end_of_record' cov.lcov
          rm cov.lcov

          # --coverage-format=json --coverage-output writes a JSON file
          ./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=json --coverage-output=cov.json
          grep -q '"path":' cov.json
          grep -q '"statementMap":' cov.json
          rm cov.json

          # order-independent: --coverage-output before --coverage-format
          ./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-output=cov2.lcov --coverage-format=lcov
          grep -q '^DA:' cov2.lcov
          rm cov2.lcov

          # single-file detail view shows line annotations
          detail_output="$(./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage 2>&1)"
          printf '%s\n' "$detail_output" | grep -Eq '[0-9]+x \|'

          # branch coverage: lcov contains BRDA/BRF entries for branching code
          ./build/GocciaTestRunner tests/language/statements/if/if-else-statements.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=lcov --coverage-output=branch-cov.lcov
          grep -q '^BRDA:' branch-cov.lcov
          grep -q '^BRF:' branch-cov.lcov
          grep -q '^BRH:' branch-cov.lcov
          rm branch-cov.lcov

          # branch coverage: JSON contains branchMap and b entries
          ./build/GocciaTestRunner tests/language/statements/if/if-else-statements.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=json --coverage-output=branch-cov.json
          grep -q '"branchMap":' branch-cov.json
          grep -q '"b":' branch-cov.json
          rm branch-cov.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.mode }}
          retention-days: 1
          path: test-results-${{ matrix.mode }}.json

      - name: Run Pascal unit tests
        if: matrix.mode == 'interpreted'
        run: |
          found=0
          for test_bin in build/*.Test build/*.Test.exe; do
            if [ -f "$test_bin" ]; then
              found=1
              "$test_bin"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No Pascal unit test binaries found"
            exit 1
          fi

  benchmark:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [interpreted, bytecode]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build
        uses: actions/download-artifact@v7
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Run benchmarks
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: ./build/GocciaBenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress --format=json --output=benchmark-${{ matrix.mode }}.json

      - name: Check benchmark CLI behaviour
        run: |
          grep -q '"files": \[' benchmark-${{ matrix.mode }}.json
          grep -q '"totalBenchmarks":' benchmark-${{ matrix.mode }}.json
          grep -q '"jobCount":' benchmark-${{ matrix.mode }}.json

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ matrix.mode }}
          retention-days: 1
          path: benchmark-${{ matrix.mode }}.json

  cli:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Download build
        uses: actions/download-artifact@v7
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Check CLI flags across all apps
        run: bun run scripts/test-cli.ts

      - name: Check lexer numeric separator rejection
        run: bun run scripts/test-cli-lexer.ts

      - name: Check parser error display
        run: bun run scripts/test-cli-parser.ts

      - name: Check config file loading and per-file config
        run: bun run scripts/test-cli-config.ts

      - name: Check app-specific CLI features
        run: bun run scripts/test-cli-apps.ts

  benchmark-comment:
    needs: benchmark
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download interpreted results
        uses: actions/download-artifact@v7
        with:
          name: benchmark-interpreted

      - name: Download bytecode results
        uses: actions/download-artifact@v7
        with:
          name: benchmark-bytecode

      - name: Restore interpreted baseline
        uses: actions/cache/restore@v5
        with:
          path: benchmark-interpreted-results.json
          key: benchmark-interpreted-baseline-will-not-match
          restore-keys: benchmark-interpreted-baseline-

      - name: Restore bytecode baseline
        uses: actions/cache/restore@v5
        with:
          path: benchmark-bytecode-results.json
          key: benchmark-bytecode-baseline-will-not-match
          restore-keys: benchmark-bytecode-baseline-

      - name: Check baselines
        run: |
          if [ -f benchmark-interpreted-results.json ]; then
            echo "BASELINE_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "BASELINE_EXISTS=false" >> "$GITHUB_ENV"
          fi
          if [ -f benchmark-bytecode-results.json ]; then
            echo "BYTECODE_BASELINE_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "BYTECODE_BASELINE_EXISTS=false" >> "$GITHUB_ENV"
          fi

      - name: Compare benchmarks and comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const fmtOps = (n) => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            const fmtPercent = (change) => {
              if (change == null) return 'N/A';
              return `${change >= 0 ? '+' : ''}${change.toFixed(1)}%`;
            };
            const fmtAvg = (changes) => {
              if (changes.length === 0) return '';
              const avg = changes.reduce((a, b) => a + b, 0) / changes.length;
              return `avg ${fmtPercent(avg)}`;
            };
            const fmtDelta = (classification, change) => {
              if (change == null) return classification === 'new' ? '🆕' : 'N/A';
              if (classification === 'improved') return `🟢 ${fmtPercent(change)}`;
              if (classification === 'regressed') return `🔴 ${fmtPercent(change)}`;
              if (classification === 'unchanged') return `~ overlap (${fmtPercent(change)})`;
              return '🆕';
            };
            const fmtRange = (entry) => {
              if (!entry) return '—';
              if (entry.minOpsPerSec === entry.maxOpsPerSec) return fmtOps(entry.opsPerSec);
              return `${fmtOps(entry.minOpsPerSec)}..${fmtOps(entry.maxOpsPerSec)}`;
            };
            const fmtBenchmark = (entry) => {
              if (!entry) return '—';
              if (entry.minOpsPerSec === entry.maxOpsPerSec) return `${fmtOps(entry.opsPerSec)} ops/sec`;
              return `${fmtOps(entry.opsPerSec)} ops/sec [${fmtRange(entry)}]`;
            };
            const fmtCell = (baseEntry, currentEntry) => {
              if (baseEntry) return `${fmtBenchmark(baseEntry)} → ${fmtBenchmark(currentEntry)}`;
              return fmtBenchmark(currentEntry);
            };
            const normalizeBenchmark = (benchmark) => ({
              opsPerSec: benchmark.opsPerSec,
              minOpsPerSec: benchmark.minOpsPerSec ?? benchmark.opsPerSec,
              maxOpsPerSec: benchmark.maxOpsPerSec ?? benchmark.opsPerSec,
              variancePercentage: benchmark.variancePercentage ?? 0,
            });
            const calculateChange = (baseEntry, currentEntry) => {
              if (!baseEntry || !baseEntry.opsPerSec) return null;
              return ((currentEntry.opsPerSec - baseEntry.opsPerSec) / baseEntry.opsPerSec) * 100;
            };
            const classify = (baseEntry, currentEntry) => {
              if (!baseEntry) return 'new';
              if (currentEntry.minOpsPerSec > baseEntry.maxOpsPerSec) return 'improved';
              if (currentEntry.maxOpsPerSec < baseEntry.minOpsPerSec) return 'regressed';
              return 'unchanged';
            };

            const interpData = JSON.parse(fs.readFileSync('benchmark-interpreted.json', 'utf8'));
            const bytecodeData = JSON.parse(fs.readFileSync('benchmark-bytecode.json', 'utf8'));

            let interpBaseline = null;
            if (process.env.BASELINE_EXISTS === 'true') {
              try { interpBaseline = JSON.parse(fs.readFileSync('benchmark-interpreted-results.json', 'utf8')); }
              catch (e) { console.log('Failed to parse interpreted baseline:', e.message); }
            }
            let bytecodeBaseline = null;
            if (process.env.BYTECODE_BASELINE_EXISTS === 'true') {
              try { bytecodeBaseline = JSON.parse(fs.readFileSync('benchmark-bytecode-results.json', 'utf8')); }
              catch (e) { console.log('Failed to parse bytecode baseline:', e.message); }
            }
            const hasAnyBaseline = interpBaseline || bytecodeBaseline;

            function buildMap(data) {
              const map = {};
              if (!data) return map;
              for (const file of data.files) {
                const m = {};
                for (const b of file.benchmarks) {
                  if (!b.error) m[`${b.suite} > ${b.name}`] = normalizeBenchmark(b);
                }
                map[file.file] = m;
              }
              return map;
            }

            const interpBaseMap = buildMap(interpBaseline);
            const bytecodeBaseMap = buildMap(bytecodeBaseline);
            const bytecodeCurrentMap = buildMap(bytecodeData);

            const newStats = () => ({ improved: 0, regressed: 0, unchanged: 0, new: 0, changes: [] });
            const totals = { interp: newStats(), bytecode: newStats() };
            let totalBenchmarks = 0;
            const fileBlocks = [];

            for (const file of interpData.files) {
              const fileName = file.file;
              const iBase = interpBaseMap[fileName] || {};
              const bBase = bytecodeBaseMap[fileName] || {};
              const bCurrent = bytecodeCurrentMap[fileName] || {};
              const fileS = { interp: newStats(), bytecode: newStats() };
              let fileRows = '';
              const benches = file.benchmarks.filter(b => !b.error);
              totalBenchmarks += benches.length;

              if (hasAnyBaseline) {
                fileRows += '| Benchmark | Interpreted | Δ | Bytecode | Δ |\n';
                fileRows += '|-----------|------------|---|---------|---|\n';
              } else {
                fileRows += '| Benchmark | Interpreted | Bytecode |\n';
                fileRows += '|-----------|------------|----------|\n';
              }

              for (const bench of benches) {
                const key = `${bench.suite} > ${bench.name}`;
                const iCurrent = normalizeBenchmark(bench);
                const bCurrentEntry = bCurrent[key];
                const iBaseEntry = iBase[key];
                const bBaseEntry = bBase[key];

                if (hasAnyBaseline) {
                  let iDelta;
                  if (iBaseEntry) {
                    const c = calculateChange(iBaseEntry, iCurrent);
                    const classification = classify(iBaseEntry, iCurrent);
                    if (c != null) fileS.interp.changes.push(c);
                    fileS.interp[classification]++;
                    iDelta = fmtDelta(classification, c);
                  } else {
                    iDelta = '🆕';
                    fileS.interp.new++;
                  }

                  let bDelta;
                  if (bCurrentEntry && bBaseEntry) {
                    const c = calculateChange(bBaseEntry, bCurrentEntry);
                    const classification = classify(bBaseEntry, bCurrentEntry);
                    if (c != null) fileS.bytecode.changes.push(c);
                    fileS.bytecode[classification]++;
                    bDelta = fmtDelta(classification, c);
                  } else if (bCurrentEntry) {
                    bDelta = '🆕';
                    fileS.bytecode.new++;
                  } else {
                    bDelta = '—';
                  }

                  fileRows += `| ${bench.name} | ${fmtCell(iBaseEntry, iCurrent)} | ${iDelta} | ${bCurrentEntry ? fmtCell(bBaseEntry, bCurrentEntry) : '—'} | ${bDelta} |\n`;
                } else {
                  fileRows += `| ${bench.name} | ${fmtRange(iCurrent)} | ${bCurrentEntry ? fmtRange(bCurrentEntry) : '—'} |\n`;
                }
              }

              for (const mode of ['interp', 'bytecode']) {
                for (const k of ['improved', 'regressed', 'unchanged', 'new']) totals[mode][k] += fileS[mode][k];
                totals[mode].changes.push(...fileS[mode].changes);
              }

              const hasSignificant = fileS.interp.improved + fileS.interp.regressed + fileS.bytecode.improved + fileS.bytecode.regressed > 0;

              function modeSummary(label, s) {
                const p = [];
                if (s.improved > 0) p.push(`🟢 ${s.improved}`);
                if (s.regressed > 0) p.push(`🔴 ${s.regressed}`);
                if (s.new > 0) p.push(`🆕 ${s.new}`);
                if (s.unchanged > 0) p.push(`${s.unchanged} unch.`);
                const avg = fmtAvg(s.changes);
                return `${label}: ${p.length > 0 ? p.join(', ') : `${s.changes.length + s.new}`}${avg ? ` · ${avg}` : ''}`;
              }

              const fileSummary = hasAnyBaseline
                ? modeSummary('Interp', fileS.interp) + ' · ' + modeSummary('Bytecode', fileS.bytecode)
                : `${benches.length} benchmarks`;

              fileBlocks.push({ fileName, fileSummary, fileRows, hasSignificant });
            }

            let body = '## Benchmark Results\n\n';

            if (hasAnyBaseline) {
              function overallMode(label, s) {
                const p = [];
                if (s.improved > 0) p.push(`🟢 ${s.improved} improved`);
                if (s.regressed > 0) p.push(`🔴 ${s.regressed} regressed`);
                if (s.new > 0) p.push(`🆕 ${s.new} new`);
                if (s.unchanged > 0) p.push(`${s.unchanged} unchanged`);
                const avg = fmtAvg(s.changes);
                return `**${label}:** ${p.join(' · ')}${avg ? ` · ${avg}` : ''}`;
              }
              body += `**${totalBenchmarks}** benchmarks\n\n`;
              body += overallMode('Interpreted', totals.interp) + '\\\n';
              body += overallMode('Bytecode', totals.bytecode) + '\n\n';
            } else {
              body += `**${totalBenchmarks}** benchmarks (no baseline)\n\n`;
            }

            for (const block of fileBlocks) {
              const shortName = block.fileName.replace(/^benchmarks\//, '');
              const open = block.hasSignificant ? ' open' : '';
              body += `<details${open}>\n`;
              body += `<summary><strong>${shortName}</strong> — ${block.fileSummary}</summary>\n\n`;
              body += block.fileRows;
              body += `\n</details>\n\n`;
            }

            body += '<sub>Measured on ubuntu-latest x64. Benchmark ranges compare cached main-branch min/max ops/sec with the PR run; overlapping ranges are treated as unchanged noise. Percentage deltas are secondary context.</sub>';

            const marker = '<!-- benchmark-comparison -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  timing-comment:
    needs: [test, benchmark]
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download test results (interpreted)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: test-results-interpreted

      - name: Download test results (bytecode)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: test-results-bytecode

      - name: Download benchmark results (interpreted)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: benchmark-interpreted

      - name: Download benchmark results (bytecode)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: benchmark-bytecode

      - name: Post timing comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tryRead = (p) => { try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return null; } };
            const fmtDur = (ns) => {
              if (typeof ns !== 'number') return '—';
              const ms = ns / 1e6;
              if (ms >= 60000) return (ms / 60000).toFixed(2) + 'min';
              if (ms >= 1000) return (ms / 1000).toFixed(2) + 's';
              return ms.toFixed(1) + 'ms';
            };
            const fmtBytes = (bytes) => {
              if (typeof bytes !== 'number') return '—';
              const abs = Math.abs(bytes);
              if (abs >= 1024 ** 3) return `${(bytes / (1024 ** 3)).toFixed(2)} GiB`;
              if (abs >= 1024 ** 2) return `${(bytes / (1024 ** 2)).toFixed(2)} MiB`;
              if (abs >= 1024) return `${(bytes / 1024).toFixed(1)} KiB`;
              return `${bytes} B`;
            };
            const fmtCount = (value) => typeof value === 'number' ? value.toLocaleString('en-US') : '—';
            const fmtNonNegativeBytes = (bytes) => typeof bytes === 'number' && bytes >= 0 ? fmtBytes(bytes) : '—';
            const hasNonNegativeValue = (...values) => values.some((value) => typeof value === 'number' && value >= 0);
            const testSummary = (report) => {
              if (!report) return '—';
              const passed = typeof report.passed === 'number' ? `${fmtCount(report.passed)} passed` : '—';
              return report.failed > 0 ? `${passed}, ${fmtCount(report.failed)} failed` : passed;
            };
            const countSummary = (count) => typeof count === 'number' ? fmtCount(count) : '—';
            const row = (metric, interpreted, bytecode) => `| ${metric} | ${interpreted} | ${bytecode} |\n`;
            const details = (summary, content) => `<details>\n<summary>${summary}</summary>\n\n${content}\n</details>\n\n`;
            const memoryRows = (interpreted, bytecode) => {
              let rows = '| Metric | Interpreted | Bytecode |\n';
              rows += '|--------|------------|----------|\n';
              rows += row('GC Live', fmtBytes(interpreted?.memory?.gc?.liveBytes), fmtBytes(bytecode?.memory?.gc?.liveBytes));
              rows += row('GC Peak Live', fmtBytes(interpreted?.memory?.gc?.peakLiveBytes), fmtBytes(bytecode?.memory?.gc?.peakLiveBytes));
              rows += row('GC Allocated During Run', fmtBytes(interpreted?.memory?.gc?.allocatedDuringRunBytes), fmtBytes(bytecode?.memory?.gc?.allocatedDuringRunBytes));
              rows += row('GC Limit', fmtBytes(interpreted?.memory?.gc?.limitBytes), fmtBytes(bytecode?.memory?.gc?.limitBytes));
              rows += row('GC Collections', fmtCount(interpreted?.memory?.gc?.collections), fmtCount(bytecode?.memory?.gc?.collections));
              rows += row('GC Collected Objects', fmtCount(interpreted?.memory?.gc?.collectedObjects), fmtCount(bytecode?.memory?.gc?.collectedObjects));
              rows += row('Heap Start Allocated', fmtBytes(interpreted?.memory?.heap?.startAllocatedBytes), fmtBytes(bytecode?.memory?.heap?.startAllocatedBytes));
              rows += row('Heap End Allocated', fmtBytes(interpreted?.memory?.heap?.endAllocatedBytes), fmtBytes(bytecode?.memory?.heap?.endAllocatedBytes));
              rows += row('Heap Delta Allocated', fmtBytes(interpreted?.memory?.heap?.deltaAllocatedBytes), fmtBytes(bytecode?.memory?.heap?.deltaAllocatedBytes));
              if (hasNonNegativeValue(interpreted?.memory?.heap?.deltaFreeBytes, bytecode?.memory?.heap?.deltaFreeBytes))
                rows += row('Heap Delta Free', fmtNonNegativeBytes(interpreted?.memory?.heap?.deltaFreeBytes), fmtNonNegativeBytes(bytecode?.memory?.heap?.deltaFreeBytes));
              return rows;
            };

            const testInterp = tryRead('test-results-interpreted.json');
            const testBytecode = tryRead('test-results-bytecode.json');
            const benchInterp = tryRead('benchmark-interpreted.json');
            const benchBytecode = tryRead('benchmark-bytecode.json');

            if (!testInterp && !testBytecode && !benchInterp && !benchBytecode) {
              console.log('No timing data available');
              return;
            }

            let body = '## Suite Timing\n\n';

            if (testInterp || testBytecode) {
              const iTests = testInterp ? testInterp.totalTests : '—';
              const bTests = testBytecode ? testBytecode.totalTests : '—';
              const iPassed = testInterp ? `${testInterp.passed} ✅` : '—';
              const bPassed = testBytecode ? `${testBytecode.passed} ✅` : '—';
              const iFailed = testInterp ? testInterp.failed : 0;
              const bFailed = testBytecode ? testBytecode.failed : 0;
              const iSkipped = testInterp ? testInterp.skipped : 0;
              const bSkipped = testBytecode ? testBytecode.skipped : 0;
              const iDur = testInterp ? fmtDur(testInterp.durationNanoseconds) : '—';
              const bDur = testBytecode ? fmtDur(testBytecode.durationNanoseconds) : '—';
              const iJobs = testInterp ? (testInterp.jobCount || 1) : 1;
              const bJobs = testBytecode ? (testBytecode.jobCount || 1) : 1;
              const isParallel = iJobs > 1 || bJobs > 1;
              const timingLabel = isParallel ? ' (cumulative)' : '';
              const iLex = testInterp ? fmtDur(testInterp.lexTimeNanoseconds) : '—';
              const bLex = testBytecode ? fmtDur(testBytecode.lexTimeNanoseconds) : '—';
              const iParse = testInterp ? fmtDur(testInterp.parseTimeNanoseconds) : '—';
              const bParse = testBytecode ? fmtDur(testBytecode.parseTimeNanoseconds) : '—';
              const bCompile = testBytecode ? fmtDur(testBytecode.compileTimeNanoseconds) : '—';
              const iExec = testInterp ? fmtDur(testInterp.executeTimeNanoseconds) : '—';
              const bExec = testBytecode ? fmtDur(testBytecode.executeTimeNanoseconds) : '—';
              const iEngine = testInterp ? fmtDur(testInterp.totalEngineNanoseconds) : '—';
              const bEngine = testBytecode ? fmtDur(testBytecode.totalEngineNanoseconds) : '—';

              let section = '| Metric | Interpreted | Bytecode |\n';
              section += '|--------|------------|----------|\n';
              section += row('Total', iTests, bTests);
              section += row('Passed', iPassed, bPassed);
              if (iFailed > 0 || bFailed > 0)
                section += row('Failed', iFailed > 0 ? `${iFailed} ❌` : '0', bFailed > 0 ? `${bFailed} ❌` : '0');
              if (iSkipped > 0 || bSkipped > 0)
                section += row('Skipped', iSkipped, bSkipped);
              if (isParallel)
                section += row('Workers', iJobs, bJobs);
              section += row('Test Duration', iDur, bDur);
              section += row(`Lex${timingLabel}`, iLex, bLex);
              section += row(`Parse${timingLabel}`, iParse, bParse);
              section += row(`Compile${timingLabel}`, '—', bCompile);
              section += row(`Execute${timingLabel}`, iExec, bExec);
              section += row(`Engine Total${timingLabel}`, iEngine, bEngine);
              if (isParallel) {
                const fmtAvg = (ns, jobs) => jobs > 1 ? fmtDur(ns / jobs) : '—';
                const iAvgLex = testInterp && iJobs > 1 ? fmtAvg(testInterp.lexTimeNanoseconds, iJobs) : '—';
                const bAvgLex = testBytecode && bJobs > 1 ? fmtAvg(testBytecode.lexTimeNanoseconds, bJobs) : '—';
                const iAvgParse = testInterp && iJobs > 1 ? fmtAvg(testInterp.parseTimeNanoseconds, iJobs) : '—';
                const bAvgParse = testBytecode && bJobs > 1 ? fmtAvg(testBytecode.parseTimeNanoseconds, bJobs) : '—';
                const bAvgCompile = testBytecode && bJobs > 1 ? fmtAvg(testBytecode.compileTimeNanoseconds, bJobs) : '—';
                const iAvgExec = testInterp && iJobs > 1 ? fmtAvg(testInterp.executeTimeNanoseconds, iJobs) : '—';
                const bAvgExec = testBytecode && bJobs > 1 ? fmtAvg(testBytecode.executeTimeNanoseconds, bJobs) : '—';
                const iAvgEngine = testInterp && iJobs > 1 ? fmtAvg(testInterp.totalEngineNanoseconds, iJobs) : '—';
                const bAvgEngine = testBytecode && bJobs > 1 ? fmtAvg(testBytecode.totalEngineNanoseconds, bJobs) : '—';
                section += row('Lex (avg/worker)', iAvgLex, bAvgLex);
                section += row('Parse (avg/worker)', iAvgParse, bAvgParse);
                section += row('Compile (avg/worker)', '—', bAvgCompile);
                section += row('Execute (avg/worker)', iAvgExec, bAvgExec);
                section += row('Engine Total (avg/worker)', iAvgEngine, bAvgEngine);
              }
              section += '\n### Memory\n\n';
              section += '_GC rows aggregate the main thread plus all worker thread-local GCs. Test runner worker shutdown frees thread-local heaps in bulk; that shutdown reclamation is not counted as GC collections or collected objects._\n\n';
              section += memoryRows(testInterp, testBytecode);
              body += details(`Test Runner (interpreted: ${testSummary(testInterp)}; bytecode: ${testSummary(testBytecode)})`, section);
            }

            if (benchInterp || benchBytecode) {
              const iBenchCount = benchInterp ? benchInterp.files.reduce((a, f) => a + f.benchmarks.filter(b => !b.error).length, 0) : '—';
              const bBenchCount = benchBytecode ? benchBytecode.files.reduce((a, f) => a + f.benchmarks.filter(b => !b.error).length, 0) : '—';
              const iBenchDur = benchInterp ? fmtDur(benchInterp.totalDurationNanoseconds) : '—';
              const bBenchDur = benchBytecode ? fmtDur(benchBytecode.totalDurationNanoseconds) : '—';
              const iBenchJobs = benchInterp ? (benchInterp.jobCount || 1) : 1;
              const bBenchJobs = benchBytecode ? (benchBytecode.jobCount || 1) : 1;
              const benchParallel = iBenchJobs > 1 || bBenchJobs > 1;

              let section = '| Metric | Interpreted | Bytecode |\n';
              section += '|--------|------------|----------|\n';
              section += row('Total', iBenchCount, bBenchCount);
              if (benchParallel)
                section += row('Workers', iBenchJobs, bBenchJobs);
              section += row('Duration', iBenchDur, bBenchDur);
              section += '\n### Memory\n\n';
              section += '_GC rows aggregate the main thread plus all worker thread-local GCs. Benchmark runner performs explicit between-file collections, so collection and collected-object counts can be much higher than the test runner._\n\n';
              section += memoryRows(benchInterp, benchBytecode);
              body += details(`Benchmarks (interpreted: ${countSummary(iBenchCount)}; bytecode: ${countSummary(bBenchCount)})`, section);
            }

            body += '<sub>Measured on ubuntu-latest x64.</sub>';

            const marker = '<!-- suite-timing -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
