  test262:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Read test262 pin
        id: test262-pin
        run: |
          sha="$(tr -d '[:space:]' < scripts/test262-suite-sha.txt)"
          if ! [[ "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid test262 pin in scripts/test262-suite-sha.txt"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout test262 suite
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: tc39/test262
          # Pin to an immutable SHA so the cached `main` baseline and a PR
          # run measure the same upstream test corpus.  `ref: main` would
          # let new tests land mid-PR and surface as spurious deltas
          # against the cached baseline.  The weekly cron at
          # .github/workflows/test262-bump.yml updates the shared pin file.
          ref: ${{ steps.test262-pin.outputs.sha }}
          path: test262-suite
          fetch-depth: 1
          persist-credentials: false

      - name: Run test262 conformance suite
        continue-on-error: true
        # --timeout-ms=20000: the per-test deadline is wall-clock, and at
        # --jobs=4 the workers fully subscribe the runner, inflating each
        # test's wall time ~30-40% vs the old --jobs=2 baseline; borderline
        # 7-9s tests must not trip the deadline purely from contention.
        # --jobs=4 matches the 4 vCPUs on GH-hosted ubuntu-latest runners
        # for public repos.  Per-test subprocesses tolerate scheduler
        # jitter (each test gets its own engine-side deadline), so the
        # only remaining limit is core count.
        run: |
          bun scripts/run_test262_suite.ts \
            --suite-dir test262-suite \
            --mode=bytecode \
            --jobs=4 \
            --timeout-ms=20000 \
            --output=test262-results.json

      - name: Upload test262 results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test262-results
          retention-days: 7
          path: test262-results.json

  benchmark-comment:
    needs: benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download interpreted results
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: benchmark-interpreted

      - name: Download bytecode results
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: benchmark-bytecode

      - name: Download deterministic profiles
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        continue-on-error: true
        with:
          name: profile-current
          path: profile-current/

      - name: Download interpreted main results
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        continue-on-error: true
        with:
          name: benchmark-interpreted-main

      - name: Download bytecode main results
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        continue-on-error: true
        with:
          name: benchmark-bytecode-main

      - name: Download main deterministic profiles
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        continue-on-error: true
        with:
          name: profile-main
          path: profile-main/

      - name: Compare benchmarks and comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const { buildBenchmarkComparison } = require('./scripts/benchmark-compare.js');
            const { buildProfileDiffSection } = require('./scripts/profile-diff.js');

            const read = (p) => JSON.parse(fs.readFileSync(p, 'utf8'));
            const tryRead = (p) => {
              try { return read(p); }
              catch (e) { console.log(`No same-runner main result at ${p}:`, e.message); return null; }
            };

            // Deterministic profile diff (opcode/allocation counts) is runner
            // independent, so it compares the same-runner main build's profiles.
            const skipProfile = /\[skip-profile-check\]/.test(context.payload.pull_request?.body || '');
            let profileDiff = '';
            try {
              profileDiff = buildProfileDiffSection({
                baselineDir: 'profile-main',
                currentDir: 'profile-current',
                skip: skipProfile,
              }).markdown;
            } catch (error) {
              console.log('Failed to build deterministic profile diff:', error.message);
              profileDiff = '## Deterministic profile diff\n\nDeterministic profile diff: unavailable due to a comparison error.';
            }

            const { body: inner } = buildBenchmarkComparison({
              interpData: read('benchmark-interpreted.json'),
              interpMain: tryRead('benchmark-interpreted-main.json'),
              bytecodeData: read('benchmark-bytecode.json'),
              bytecodeMain: tryRead('benchmark-bytecode-main.json'),
              profileDiff,
              runnerLabel: 'ubuntu-latest x64',
            });

            const marker = '<!-- benchmark-comparison -->';
            const body = marker + '\n' + inner;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

