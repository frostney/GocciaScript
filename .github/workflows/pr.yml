name: PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install FPC
        run: sudo apt-get update && sudo apt-get install fpc -qq > /dev/null

      - name: Check formatting
        run: ./format.pas --check

      - name: Build all
        run: ./build.pas --prod

      - name: Stage build artifacts
        run: bash ./.github/scripts/stage-build-artifacts.sh build pr-artifacts --include-tests

      - name: Upload build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-pr
          retention-days: 1
          path: pr-artifacts/*

  # Builds the benchmark runner from the PR's base commit (the `main` the PR
  # targets) so the `benchmark` job can measure it back-to-back with the PR build
  # on the *same* runner. This is the trustworthy half of the same-runner A/B
  # comparison that replaces the old cross-runner cached baseline (issue #815).
  build-main:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install FPC
        run: sudo apt-get update && sudo apt-get install fpc -qq > /dev/null

      - name: Build benchmark runner and loader (main base)
        run: ./build.pas --prod benchmarkrunner loader

      - name: Upload main build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-main
          retention-days: 1
          path: |
            build/GocciaBenchmarkRunner
            build/GocciaScriptLoader

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23

      - name: Check doc symbol references
        run: npx tsx scripts/check-doc-symbols.ts

      - name: Check doc duplication
        run: npx tsx scripts/check-doc-duplication.ts

      - name: Check doc file length
        run: npx tsx scripts/check-doc-length.ts

      - name: Check doc links
        run: npx tsx scripts/check-doc-links.ts

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [interpreted, bytecode]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Build FFI fixture library
        run: ./fixtures/ffi/build.sh

      - name: Run all JavaScript tests
        run: ./build/GocciaTestRunner tests ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --silent --no-progress --output=test-results-${{ matrix.mode }}.json

      - name: Check GocciaTestRunner CLI behaviour
        run: |
          grep -q '"mode": "${{ matrix.mode }}"' test-results-${{ matrix.mode }}.json
          grep -q '"totalFiles":' test-results-${{ matrix.mode }}.json
          grep -q '"jobCount":' test-results-${{ matrix.mode }}.json

      - name: Check GocciaTestRunner coverage CLI
        run: |
          # --coverage prints a summary to stdout
          cov_output="$(./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage 2>&1)"
          printf '%s\n' "$cov_output" | grep -q 'Coverage Summary:'
          printf '%s\n' "$cov_output" | grep -q 'array-creation.js'

          # --coverage-format=lcov --coverage-output writes an lcov file
          ./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=lcov --coverage-output=cov.lcov
          grep -q '^SF:' cov.lcov
          grep -q '^DA:' cov.lcov
          grep -q '^end_of_record' cov.lcov
          rm cov.lcov

          # --coverage-format=json --coverage-output writes a JSON file
          ./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=json --coverage-output=cov.json
          grep -q '"path":' cov.json
          grep -q '"statementMap":' cov.json
          rm cov.json

          # order-independent: --coverage-output before --coverage-format
          ./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-output=cov2.lcov --coverage-format=lcov
          grep -q '^DA:' cov2.lcov
          rm cov2.lcov

          # single-file detail view shows line annotations
          detail_output="$(./build/GocciaTestRunner tests/built-ins/Array/array-creation.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage 2>&1)"
          printf '%s\n' "$detail_output" | grep -Eq '[0-9]+x \|'

          # branch coverage: lcov contains BRDA/BRF entries for branching code
          ./build/GocciaTestRunner tests/language/statements/if/if-else-statements.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=lcov --coverage-output=branch-cov.lcov
          grep -q '^BRDA:' branch-cov.lcov
          grep -q '^BRF:' branch-cov.lcov
          grep -q '^BRH:' branch-cov.lcov
          rm branch-cov.lcov

          # branch coverage: JSON contains branchMap and b entries
          ./build/GocciaTestRunner tests/language/statements/if/if-else-statements.js ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --coverage --coverage-format=json --coverage-output=branch-cov.json
          grep -q '"branchMap":' branch-cov.json
          grep -q '"b":' branch-cov.json
          rm branch-cov.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results-${{ matrix.mode }}
          retention-days: 1
          path: test-results-${{ matrix.mode }}.json

      - name: Run Pascal unit tests
        if: matrix.mode == 'interpreted'
        run: |
          found=0
          for test_bin in build/*.Test build/*.Test.exe; do
            if [ -f "$test_bin" ]; then
              found=1
              "$test_bin"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No Pascal unit test binaries found"
            exit 1
          fi

  benchmark:
    # `needs` keeps build-main ordered before this job, but its failure must not
    # skip the benchmark/benchmark-comment chain: when build-main fails (e.g. the
    # base predates the benchmarkrunner target, or a transient FPC hiccup) the
    # downstream comparison already degrades to PR-only numbers via the optional
    # main downloads + null-main handling. Run whenever `build` itself succeeded.
    needs: [build, build-main]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    # Backstop: a normal run is ~7-9 min. Per-benchmark calibration can
    # occasionally run away on a loaded GitHub runner (issue #815 follow-up); the
    # per-step `timeout`s below cap each pass, and this caps the whole leg so a
    # runaway fails in minutes instead of burning the default 360-minute budget.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        mode: [interpreted, bytecode]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: build-pr
          path: build/

      - name: Download main benchmark runner
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        continue-on-error: true
        with:
          name: build-main
          path: build-main/

      - name: Make binaries executable
        run: |
          chmod +x build/*
          # build-main is optional: a failed build-main job leaves this empty.
          chmod +x build-main/* 2>/dev/null || true

      # Same-runner A/B (issue #815): the PR and `main` builds are measured on
      # this one runner so the delta reflects the diff, not cross-runner variance.
      # Both benchmark the PR's `benchmarks/` workloads.
      #
      # One cheap, discarded warm-up pass ramps the runner CPU off its idle clock
      # and warms the OS file cache for the benchmark sources (shared by both
      # binaries) before measuring. It deliberately uses a tiny calibration
      # (10 ms, 1 round) so it stays light: an earlier full two-binary warm-up
      # roughly doubled the interpreted leg and loaded the runner right before
      # measuring, destabilising per-benchmark calibration enough that a measured
      # pass could run away for tens of minutes (issue #815 follow-up). The
      # runner's built-in per-benchmark warm-up (5 iterations) covers
      # binary-specific warmth, so warming one binary here is sufficient.
      - name: Warm up benchmark runner
        env:
          GOCCIA_BENCH_ROUNDS: 1
          GOCCIA_BENCH_CALIBRATION_MS: 10
        run: timeout 120 ./build/GocciaBenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress > /dev/null 2>&1 || true

      # `main` is built from the PR's base commit, so it cannot run benchmarks the
      # PR newly adds or changes to use new language features. The report is still
      # written before a non-zero exit, so continue-on-error keeps such a PR from
      # being blocked: a benchmark that errors on `main` simply has no baseline
      # entry and renders as 🆕 new. The PR's own run below is intentionally NOT
      # tolerant — a broken PR benchmark should fail the leg.
      # `timeout` (GNU coreutils, present on ubuntu runners) caps a single pass:
      # a normal interpreted/bytecode pass is ~3 min, so 8 min is generous, and a
      # runaway calibration loop is killed (SIGKILL 30 s after SIGTERM) instead of
      # spinning for the whole job. A killed `main` pass writes no JSON and the
      # comparison degrades to PR-only via if-no-files-found + null-main handling.
      - name: Run benchmarks (main base)
        continue-on-error: true
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: timeout -k 30 480 ./build-main/GocciaBenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress --format=json --output=benchmark-${{ matrix.mode }}-main.json

      - name: Run benchmarks
        env:
          GOCCIA_BENCH_CALIBRATION_MS: 100
          GOCCIA_BENCH_ROUNDS: 7
        run: timeout -k 30 480 ./build/GocciaBenchmarkRunner benchmarks ${{ matrix.mode == 'bytecode' && '--mode=bytecode' || '' }} --no-progress --format=json --output=benchmark-${{ matrix.mode }}.json

      - name: Capture deterministic profiles (main base)
        if: matrix.mode == 'bytecode'
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p profile-main
          while IFS= read -r bench; do
            rel="${bench#benchmarks/}"
            out="profile-main/${rel%.*}.json"
            mkdir -p "$(dirname "$out")"
            ./build-main/GocciaBenchmarkRunner "$bench" \
              --mode=bytecode \
              --profile-deterministic \
              --profile=all \
              --profile-output="$out" \
              --no-progress \
              --format=compact-json \
              > /dev/null
          done < <(find benchmarks -type f \( -name '*.js' -o -name '*.jsx' -o -name '*.ts' -o -name '*.tsx' -o -name '*.mjs' \) ! -path '*/helpers/*' | sort)

      - name: Capture deterministic profiles
        if: matrix.mode == 'bytecode'
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p profile-current
          while IFS= read -r bench; do
            rel="${bench#benchmarks/}"
            out="profile-current/${rel%.*}.json"
            mkdir -p "$(dirname "$out")"
            ./build/GocciaBenchmarkRunner "$bench" \
              --mode=bytecode \
              --profile-deterministic \
              --profile=all \
              --profile-output="$out" \
              --no-progress \
              --format=compact-json \
              > /dev/null
          done < <(find benchmarks -type f \( -name '*.js' -o -name '*.jsx' -o -name '*.ts' -o -name '*.tsx' -o -name '*.mjs' \) ! -path '*/helpers/*' | sort)

      - name: Check benchmark CLI behaviour
        run: |
          grep -q '"files": \[' benchmark-${{ matrix.mode }}.json
          grep -q '"totalBenchmarks":' benchmark-${{ matrix.mode }}.json
          grep -q '"jobCount":' benchmark-${{ matrix.mode }}.json

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-${{ matrix.mode }}
          retention-days: 1
          path: benchmark-${{ matrix.mode }}.json

      - name: Upload main results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-${{ matrix.mode }}-main
          retention-days: 1
          # Absent when build-main failed; the comparison degrades to PR-only.
          if-no-files-found: ignore
          path: benchmark-${{ matrix.mode }}-main.json

      - name: Upload deterministic profiles
        if: matrix.mode == 'bytecode'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: profile-current
          retention-days: 1
          path: profile-current/

      - name: Upload main deterministic profiles
        if: matrix.mode == 'bytecode'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: profile-main
          retention-days: 1
          # Absent when build-main failed; the profile diff degrades gracefully.
          if-no-files-found: ignore
          path: profile-main/

  awfy-report:
    needs: [build, build-main]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up latest Node.js reference
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: current
          package-manager-cache: false

      - name: Install QuickJS
        run: bash ./.github/scripts/install-quickjs.sh

      - name: Download build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: build-pr
          path: build/

      - name: Download main build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: build-main
          path: build-main/

      - name: Make binaries executable
        run: |
          chmod +x build/*
          chmod +x build-main/*

      - name: Read AWFY pin
        id: awfy-pin
        run: |
          sha="$(node -e "const m = require('./perf/awfy/manifest.json'); process.stdout.write(m.awfy.commit)")"
          if ! [[ "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid AWFY pin in perf/awfy/manifest.json"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout AWFY corpus
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: smarr/are-we-fast-yet
          ref: ${{ steps.awfy-pin.outputs.sha }}
          path: awfy-suite
          fetch-depth: 1
          persist-credentials: false

      - name: Check AWFY driver helpers
        run: node scripts/test-awfy-driver.js

      - name: Run AWFY report
        run: |
          node scripts/awfy-ci-report.js \
            --awfy-dir awfy-suite/benchmarks/JavaScript \
            --goccia-baseline build-main/GocciaScriptLoader \
            --goccia-candidate build/GocciaScriptLoader \
            --output awfy-report.json

      - name: Upload AWFY report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: awfy-report
          retention-days: 7
          if-no-files-found: ignore
          path: awfy-report.json

  jetstream-report:
    needs: [build, build-main]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up latest Node.js reference
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: current
          package-manager-cache: false

      - name: Install QuickJS
        run: bash ./.github/scripts/install-quickjs.sh

      - name: Download build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: build-pr
          path: build/

      - name: Download main build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: build-main
          path: build-main/

      - name: Make binaries executable
        run: |
          chmod +x build/*
          chmod +x build-main/*

      - name: Read JetStream pin
        id: jetstream-pin
        run: |
          sha="$(node -e "const m = require('./perf/jetstream/manifest.json'); process.stdout.write(m.jetStream.commit)")"
          if ! [[ "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid JetStream pin in perf/jetstream/manifest.json"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout JetStream corpus
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: WebKit/JetStream
          ref: ${{ steps.jetstream-pin.outputs.sha }}
          path: jetstream-suite
          fetch-depth: 1
          persist-credentials: false
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /LICENSE
            /README.md
            /simple/hash-map.js
            /SeaMonster/ai-astar.js
            /SeaMonster/gaussian-blur.js
            /class-fields/raytrace-public-class-fields.js
            /generators/sync-file-system.js
            /generators/lazy-collections.js

      - name: Check JetStream driver helpers
        run: node scripts/test-jetstream-driver.js

      - name: Run JetStream report
        run: |
          node scripts/jetstream-ci-report.js \
            --jetstream-dir jetstream-suite \
            --goccia-baseline build-main/GocciaScriptLoader \
            --goccia-candidate build/GocciaScriptLoader \
            --output jetstream-report.json

      - name: Upload JetStream report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jetstream-report
          retention-days: 7
          if-no-files-found: ignore
          path: jetstream-report.json

  web-tooling-plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.workloads.outputs.matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Check Web Tooling driver helpers
        run: node scripts/test-web-tooling-driver.js

      - name: Read Web Tooling workload matrix
        id: workloads
        run: |
          matrix="$(node -e "const m = require('./perf/web-tooling/manifest.json'); const { workloadTimeoutMs } = require('./scripts/web-tooling-ci-report.js'); process.stdout.write(JSON.stringify({ include: m.ciReport.workloads.map(workload => ({ workload, timeoutMinutes: Math.ceil(workloadTimeoutMs(m.ciReport, workload) / 60000) + 15 })) }))")"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  web-tooling-workload:
    name: web-tooling-workload (${{ matrix.workload }})
    needs: [build, web-tooling-plan]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeoutMinutes }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.web-tooling-plan.outputs.matrix) }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up latest Node.js tooling runtime
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: current
          package-manager-cache: false

      - name: Download build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: build-pr
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Read Web Tooling pin
        id: web-tooling-pin
        run: |
          sha="$(node -e "const m = require('./perf/web-tooling/manifest.json'); process.stdout.write(m.webTooling.commit)")"
          if ! [[ "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid Web Tooling pin in perf/web-tooling/manifest.json"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout Web Tooling corpus
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: v8/web-tooling-benchmark
          ref: ${{ steps.web-tooling-pin.outputs.sha }}
          path: web-tooling-suite
          fetch-depth: 1
          persist-credentials: false

      - name: Install Web Tooling dependencies
        working-directory: web-tooling-suite
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Run Web Tooling report
        env:
          WORKLOAD: ${{ matrix.workload }}
        run: |
          node scripts/web-tooling-ci-report.js \
            --web-tooling-dir web-tooling-suite \
            --workload "$WORKLOAD" \
            --output "web-tooling-report-$WORKLOAD.json"

      - name: Upload Web Tooling workload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: web-tooling-report-${{ matrix.workload }}
          retention-days: 7
          if-no-files-found: ignore
          path: web-tooling-report-${{ matrix.workload }}.json

  web-tooling-report:
    needs: web-tooling-workload
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download Web Tooling workload reports
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: web-tooling-report-*
          path: web-tooling-reports
          merge-multiple: true

      - name: Merge Web Tooling report
        run: |
          node scripts/web-tooling-merge-reports.js \
            --output web-tooling-report.json \
            web-tooling-reports/*.json

      - name: Upload Web Tooling report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: web-tooling-report
          retention-days: 7
          path: web-tooling-report.json

