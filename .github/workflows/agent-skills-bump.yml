name: agent skills weekly bump

# Refreshes the lock-managed project skills from their configured upstream
# repositories and opens a PR when the generated skill tree changes. Repo-native
# skills that are not present in skills-lock.json are left untouched.
#
# Cadence: weekly (Mondays 08:00 UTC). Manual trigger available via
# workflow_dispatch.

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: agent-skills-weekly-bump
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Refresh lock-managed skills
        run: |
          npx -y skills@1.5.17 update --project --yes

          # The API-backed updater can retain stale find-skills content while
          # reporting success. Force a full-depth clone for that known source.
          npx -y skills@1.5.17 remove find-skills --yes
          npx -y skills@1.5.17 add vercel-labs/skills \
            --full-depth \
            --skill find-skills \
            --agent codex claude-code \
            --yes

      - name: Verify project skill inventory
        run: |
          npx -y skills@1.5.17 list --json > skill-inventory.json
          node scripts/validate-skill-inventory.js skill-inventory.json

      - id: changed
        run: |
          if [ -z "$(git status --porcelain=v1 --untracked-files=all -- \
            .agents/skills skills-lock.json)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Project skills are already current; no PR to open."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Package refreshed skill tree
        if: steps.changed.outputs.changed == 'true'
        run: tar -cf agent-skills-refresh.tar .agents/skills skills-lock.json skill-inventory.json

      - name: Upload refreshed skill tree
        if: steps.changed.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: agent-skills-refresh
          path: agent-skills-refresh.tar
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download refreshed skill tree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: agent-skills-refresh

      - name: Apply and verify refreshed skill tree
        run: |
          rm -rf .agents/skills
          tar -xf agent-skills-refresh.tar
          rm agent-skills-refresh.tar
          node scripts/validate-skill-inventory.js skill-inventory.json
          rm skill-inventory.json

          if [ -z "$(git status --porcelain=v1 --untracked-files=all -- \
            .agents/skills skills-lock.json)" ]; then
            echo "Refreshed skill artifact contains no repository changes."
            exit 1
          fi

      - name: Open or update PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/agent-skills-bump
          commit-message: "chore(skills): sync provisioned skills"
          title: "chore(skills): sync provisioned skills"
          body: |
            Automated refresh of the lock-managed project skills and `skills-lock.json`.

            Repo-native skills are not managed by this workflow. Review upstream
            instruction changes before merging.

            Cron: weekly, Mondays 08:00 UTC. See `.github/workflows/agent-skills-bump.yml`.
          labels: automated
