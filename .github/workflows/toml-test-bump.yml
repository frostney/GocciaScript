name: toml-test weekly bump

# Pulls the latest toml-lang/toml-test main SHA, updates the pin in
# scripts/run_toml_test_suite.py, and opens a PR.  Merge once the
# compliance delta is acceptable.
#
# Cadence: weekly (Mondays 06:30 UTC).  Manual trigger available via
# workflow_dispatch.

on:
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - id: latest
        run: |
          sha=$(gh api repos/toml-lang/toml-test/commits/main --jq .sha)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short=${sha:0:8}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update pin in suite runner
        run: bun scripts/suite-bump-pin.ts scripts/run_toml_test_suite.py ${{ steps.latest.outputs.sha }}

      - id: changed
        run: |
          if git diff --quiet -- scripts/run_toml_test_suite.py; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "toml-test already pinned to ${{ steps.latest.outputs.short }} — no PR to open."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update PR
        if: steps.changed.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/toml-test-bump
          commit-message: "chore(toml-test): bump pin to ${{ steps.latest.outputs.short }}"
          title: "chore(toml-test): bump pin to ${{ steps.latest.outputs.short }}"
          body: |
            Automated bump of the toml-test SHA pin to `${{ steps.latest.outputs.sha }}`.

            CI will run the TOML compliance suite against the new SHA.
            Review the delta and merge if acceptable.

            Cron: weekly, Mondays 06:30 UTC. See `.github/workflows/toml-test-bump.yml`.
          labels: |
            toml
            automated
