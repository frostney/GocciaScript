name: Build Cross-Compilation Toolchain

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      cache-key:
        value: ${{ jobs.build.outputs.cache-key }}

env:
  FPC_VERSION: "3.2.2"
  FPCUP_VERSION: "v2.4.0i"
  BINUTILS_VERSION: "2.44"
  CACHE_VERSION: "v21"

jobs:
  build:
    runs-on: macos-latest
    outputs:
      cache-key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}

    steps:
      - name: Check cache
        id: cache-check
        uses: actions/cache/restore@v4
        with:
          path: |
            fpcup-install
            cross-binutils
          key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cached
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Toolchain already cached ‚Äî nothing to build."

      - name: Download fpcup
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://github.com/LongDirtyAnimAlf/Reiniero-fpcup/releases/download/${FPCUP_VERSION}/fpcup-aarch64-darwin" -o fpcup
          chmod +x fpcup

      - name: Build GNU Binutils for Linux targets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          curl -L "https://ftp.gnu.org/gnu/binutils/binutils-${BINUTILS_VERSION}.tar.bz2" | tar xj
          NCPU=$(sysctl -n hw.ncpu)

          for target in x86_64-linux aarch64-linux; do
            mkdir "build-binutils-${target}"
            cd "build-binutils-${target}"
            ../binutils-${BINUTILS_VERSION}/configure \
              --target="${target}" \
              --prefix="$PWD/../cross-binutils" \
              --with-system-zlib \
              --disable-nls \
              --disable-werror \
              --disable-gdb \
              --disable-sim \
              --disable-libdecnumber \
              --disable-readline \
              --disable-gprofng
            make -j"$NCPU"
            make install
            cd ..
          done

      - name: Install FPC via fpcup
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          ./fpcup --installdir=$PWD/fpcup-install \
            --fpcVersion=$FPC_VERSION.gitlab --noconfirm --verbose

      - name: Install cross-compiler ‚Äî Linux x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          ./fpcup --installdir=$PWD/fpcup-install \
            --fpcVersion=$FPC_VERSION --noconfirm --verbose \
            --cputarget=x86_64 --ostarget=linux \
            --crossbindir=$PWD/cross-binutils/bin

      - name: Install cross-compiler ‚Äî Linux aarch64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          ./fpcup --installdir=$PWD/fpcup-install \
            --fpcVersion=$FPC_VERSION --noconfirm --verbose \
            --cputarget=aarch64 --ostarget=linux \
            --crossbindir=$PWD/cross-binutils/bin

      - name: Install cross-compiler ‚Äî Windows x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          ./fpcup --installdir=$PWD/fpcup-install \
            --fpcVersion=$FPC_VERSION --noconfirm --verbose \
            --cputarget=x86_64 --ostarget=win64

      - name: Install cross-compiler ‚Äî Windows i386
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          ./fpcup --installdir=$PWD/fpcup-install \
            --fpcVersion=$FPC_VERSION --noconfirm --verbose \
            --cputarget=i386 --ostarget=win32

      - name: Install cross-compiler ‚Äî macOS x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          ./fpcup --installdir=$PWD/fpcup-install \
            --fpcVersion=$FPC_VERSION --noconfirm --verbose \
            --cputarget=x86_64 --ostarget=darwin

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            fpcup-install
            cross-binutils
          key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}
