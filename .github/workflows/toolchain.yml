name: Build Cross-Compilation Toolchain

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      cache-key:
        value: ${{ jobs.build.outputs.cache-key }}

env:
  FPC_VERSION: "3.2.2"
  FPCUP_VERSION: "v2.4.0i"
  BINUTILS_VERSION: "2.44"
  CACHE_VERSION: "v24"

jobs:
  build:
    runs-on: macos-latest
    outputs:
      cache-key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}

    steps:
      - name: Check cache
        id: cache-check
        uses: actions/cache/restore@v4
        with:
          path: |
            fpcup-install
            cross-binutils
          key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cached
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Toolchain already cached — nothing to build."

      - name: Download fpclazup
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://github.com/LongDirtyAnimAlf/Reiniero-fpcup/releases/download/${FPCUP_VERSION}/fpclazup-aarch64-darwin" -o fpclazup
          chmod +x fpclazup

      - name: Build GNU Binutils for Linux targets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          curl -L "https://ftp.gnu.org/gnu/binutils/binutils-${BINUTILS_VERSION}.tar.bz2" | tar xj
          NCPU=$(sysctl -n hw.ncpu)

          for target in x86_64-linux aarch64-linux; do
            mkdir "build-binutils-${target}"
            cd "build-binutils-${target}"
            ../binutils-${BINUTILS_VERSION}/configure \
              --target="${target}" \
              --prefix="$PWD/../cross-binutils" \
              --with-system-zlib \
              --disable-nls \
              --disable-werror \
              --disable-gdb \
              --disable-sim \
              --disable-libdecnumber \
              --disable-readline \
              --disable-gprofng
            make -j"$NCPU"
            make install
            cd ..
          done

      - name: Download Linux cross-libraries
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          CROSSLIB_BASE="https://github.com/LongDirtyAnimAlf/fpcupdeluxe/releases/download/crosslibs_all"
          mkdir -p cross-libs

          # Linux x86_64
          curl -sL "$CROSSLIB_BASE/Linux_AMD64_Ubuntu_2204.zip" -o /tmp/linux-x64.zip
          mkdir -p cross-libs/x86_64-linux
          unzip -qo /tmp/linux-x64.zip -d cross-libs/x86_64-linux

          # Linux aarch64
          curl -sL "$CROSSLIB_BASE/Linux_AArch64_Ubuntu_1804.zip" -o /tmp/linux-arm64.zip
          mkdir -p cross-libs/aarch64-linux
          unzip -qo /tmp/linux-arm64.zip -d cross-libs/aarch64-linux

      - name: Install FPC via fpclazup
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          ./fpclazup --installdir=$PWD/fpcup-install \
            --fpcVersion=$FPC_VERSION.gitlab --only=FPC --noconfirm --verbose

      - name: Install cross-compiler — Linux x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          LIBDIR=$(find $PWD/cross-libs/x86_64-linux -name "libc.so" -printf "%h" -quit 2>/dev/null || find $PWD/cross-libs/x86_64-linux -name "libc.so" -exec dirname {} \; | head -1)
          ./fpclazup --installdir=$PWD/fpcup-install \
            --only="FPCCleanOnly,FPCBuildOnly" --noconfirm --verbose \
            --cputarget=x86_64 --ostarget=linux \
            --crossbindir=$PWD/cross-binutils/bin \
            --crosslibdir="$LIBDIR"

      - name: Install cross-compiler — Linux aarch64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          LIBDIR=$(find $PWD/cross-libs/aarch64-linux -name "libc.so" -printf "%h" -quit 2>/dev/null || find $PWD/cross-libs/aarch64-linux -name "libc.so" -exec dirname {} \; | head -1)
          ./fpclazup --installdir=$PWD/fpcup-install \
            --only="FPCCleanOnly,FPCBuildOnly" --noconfirm --verbose \
            --cputarget=aarch64 --ostarget=linux \
            --crossbindir=$PWD/cross-binutils/bin \
            --crosslibdir="$LIBDIR"

      - name: Install cross-compiler — Windows x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          ./fpclazup --installdir=$PWD/fpcup-install \
            --only="FPCCleanOnly,FPCBuildOnly" --noconfirm --verbose \
            --cputarget=x86_64 --ostarget=win64

      - name: Install cross-compiler — Windows i386
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          ./fpclazup --installdir=$PWD/fpcup-install \
            --only="FPCCleanOnly,FPCBuildOnly" --noconfirm --verbose \
            --cputarget=i386 --ostarget=win32

      - name: Install cross-compiler — macOS x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          ./fpclazup --installdir=$PWD/fpcup-install \
            --only="FPCCleanOnly,FPCBuildOnly" --noconfirm --verbose \
            --cputarget=x86_64 --ostarget=darwin

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            fpcup-install
            cross-binutils
          key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}
