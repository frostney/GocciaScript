name: Build Cross-Compilation Toolchain

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      cache-key:
        value: ${{ jobs.build.outputs.cache-key }}

env:
  FPC_VERSION: "3.2.2"
  BINUTILS_VERSION: "2.44"
  CACHE_VERSION: "v16"

jobs:
  build:
    runs-on: macos-latest
    outputs:
      cache-key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}

    steps:
      - name: Check cache
        id: cache-check
        uses: actions/cache/restore@v4
        with:
          path: |
            fpc-cross
            cross-binutils
          key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cached
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Toolchain already cached — nothing to build."

      - name: Install FPC
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: brew install fpc

      - name: Extract FPC sources via Homebrew
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          brew unpack --patch fpc --destdir=.
          mv fpc-* fpc-source

      - name: Set macOS SDK root
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV

      - name: Build GNU Binutils for Linux targets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          curl -L "https://ftp.gnu.org/gnu/binutils/binutils-${BINUTILS_VERSION}.tar.bz2" | tar xj
          NCPU=$(sysctl -n hw.ncpu)

          for target in x86_64-linux aarch64-linux; do
            mkdir "build-binutils-${target}"
            cd "build-binutils-${target}"
            ../binutils-${BINUTILS_VERSION}/configure \
              --target="${target}" \
              --prefix="$PWD/../cross-binutils" \
              --with-system-zlib \
              --disable-nls \
              --disable-werror \
              --disable-gdb \
              --disable-sim \
              --disable-libdecnumber \
              --disable-readline \
              --disable-gprofng
            make -j"$NCPU"
            make install
            cd ..
          done

      # Official FPC cross-compilation procedure
      # (wiki.freepascal.org/Cross_compiling):
      #
      # 1. Build cross-compiler binaries using explicit make targets
      #    (ppcrossx64, ppcross386). These use the HOST compiler
      #    (ppca64) to compile pp.pas with target CPU code generation
      #    modules, producing a macOS binary that generates target code.
      #
      # 2. Build RTL + packages for each target OS using the
      #    cross-compiler via PP=.
      #
      # 3. crossinstall to copy binaries + units to the install prefix.
      #
      # For same-CPU targets (aarch64-linux), ppca64 already generates
      # aarch64 code — use it directly via PP=ppca64 with OS_TARGET.

      - name: Build cross-compiler binaries
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd fpc-source/compiler
          make ppcrossx64 PP=ppca64 OPT="-XR$SDKROOT"
          make ppcross386 PP=ppca64 OPT="-XR$SDKROOT"

      - name: Build cross-compiler — Linux x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          export PATH="$PWD/cross-binutils/bin:$PATH"
          cd fpc-source
          make -C rtl clean all CPU_TARGET=x86_64 OS_TARGET=linux \
            PP=$PWD/compiler/ppcrossx64 BINUTILSPREFIX=x86_64-linux-
          make -C packages clean all CPU_TARGET=x86_64 OS_TARGET=linux \
            PP=$PWD/compiler/ppcrossx64 BINUTILSPREFIX=x86_64-linux-
          make crossinstall CPU_TARGET=x86_64 OS_TARGET=linux \
            PP=$PWD/compiler/ppcrossx64 INSTALL_PREFIX=$PWD/../fpc-cross

      - name: Build cross-compiler — Linux aarch64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          export PATH="$PWD/cross-binutils/bin:$PATH"
          cd fpc-source
          make -C rtl clean all CPU_TARGET=aarch64 OS_TARGET=linux \
            PP=ppca64 BINUTILSPREFIX=aarch64-linux-
          make -C packages clean all CPU_TARGET=aarch64 OS_TARGET=linux \
            PP=ppca64 BINUTILSPREFIX=aarch64-linux-
          make crossinstall CPU_TARGET=aarch64 OS_TARGET=linux \
            PP=ppca64 INSTALL_PREFIX=$PWD/../fpc-cross

      - name: Build cross-compiler — Windows x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd fpc-source
          make -C rtl clean all CPU_TARGET=x86_64 OS_TARGET=win64 \
            PP=$PWD/compiler/ppcrossx64
          make -C packages clean all CPU_TARGET=x86_64 OS_TARGET=win64 \
            PP=$PWD/compiler/ppcrossx64
          make crossinstall CPU_TARGET=x86_64 OS_TARGET=win64 \
            PP=$PWD/compiler/ppcrossx64 INSTALL_PREFIX=$PWD/../fpc-cross

      - name: Build cross-compiler — Windows i386
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd fpc-source
          make -C rtl clean all CPU_TARGET=i386 OS_TARGET=win32 \
            PP=$PWD/compiler/ppcross386
          make -C packages clean all CPU_TARGET=i386 OS_TARGET=win32 \
            PP=$PWD/compiler/ppcross386
          make crossinstall CPU_TARGET=i386 OS_TARGET=win32 \
            PP=$PWD/compiler/ppcross386 INSTALL_PREFIX=$PWD/../fpc-cross

      - name: Build cross-compiler — macOS x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd fpc-source
          make -C rtl clean all CPU_TARGET=x86_64 OS_TARGET=darwin \
            PP=$PWD/compiler/ppcrossx64
          make -C packages clean all CPU_TARGET=x86_64 OS_TARGET=darwin \
            PP=$PWD/compiler/ppcrossx64
          make crossinstall CPU_TARGET=x86_64 OS_TARGET=darwin \
            PP=$PWD/compiler/ppcrossx64 INSTALL_PREFIX=$PWD/../fpc-cross

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            fpc-cross
            cross-binutils
          key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}
