name: Build Cross-Compilation Toolchain

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      cache-key:
        value: ${{ jobs.build.outputs.cache-key }}

env:
  FPC_VERSION: "3.2.2"
  BINUTILS_VERSION: "2.44"
  CACHE_VERSION: "v17"

jobs:
  build:
    runs-on: macos-latest
    outputs:
      cache-key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}

    steps:
      - name: Check cache
        id: cache-check
        uses: actions/cache/restore@v4
        with:
          path: |
            fpc-cross
            cross-binutils
          key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cached
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Toolchain already cached — nothing to build."

      - name: Install FPC
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: brew install fpc

      - name: Extract FPC sources via Homebrew
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          brew unpack --patch fpc --destdir=.
          mv fpc-* fpc-source

      - name: Set macOS SDK root
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV

      - name: Build GNU Binutils for Linux targets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          curl -L "https://ftp.gnu.org/gnu/binutils/binutils-${BINUTILS_VERSION}.tar.bz2" | tar xj
          NCPU=$(sysctl -n hw.ncpu)

          for target in x86_64-linux aarch64-linux; do
            mkdir "build-binutils-${target}"
            cd "build-binutils-${target}"
            ../binutils-${BINUTILS_VERSION}/configure \
              --target="${target}" \
              --prefix="$PWD/../cross-binutils" \
              --with-system-zlib \
              --disable-nls \
              --disable-werror \
              --disable-gdb \
              --disable-sim \
              --disable-libdecnumber \
              --disable-readline \
              --disable-gprofng
            make -j"$NCPU"
            make install
            cd ..
          done

      # FPC cross-compilation procedure for 3.2.2:
      #
      # The top-level make handles cross-compiler builds via
      # compiler_cycle. The cycle builds the cross-compiler binary
      # (step 1), then tries to validate it by re-linking as a target
      # binary (step 2). Step 2 fails because we don't have a target
      # libc — but the cross-compiler from step 1 is already built.
      #
      # We let compiler_cycle fail, verify the cross-compiler exists,
      # then build RTL + packages separately (compilation only, no
      # linking needed).

      - name: Build cross-compiler — Linux x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          export PATH="$PWD/cross-binutils/bin:$PATH"
          cd fpc-source
          make compiler_cycle CPU_TARGET=x86_64 OS_TARGET=linux \
            BINUTILSPREFIX=x86_64-linux- || true
          test -f compiler/ppcrossx64 || { echo "ppcrossx64 not built"; exit 1; }
          make rtl_all CPU_TARGET=x86_64 OS_TARGET=linux \
            BINUTILSPREFIX=x86_64-linux-
          make packages_all CPU_TARGET=x86_64 OS_TARGET=linux \
            BINUTILSPREFIX=x86_64-linux-
          make crossinstall CPU_TARGET=x86_64 OS_TARGET=linux \
            INSTALL_PREFIX=$PWD/../fpc-cross

      - name: Build cross-compiler — Linux aarch64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          export PATH="$PWD/cross-binutils/bin:$PATH"
          cd fpc-source
          make compiler_cycle CPU_TARGET=aarch64 OS_TARGET=linux \
            BINUTILSPREFIX=aarch64-linux- || true
          make rtl_all CPU_TARGET=aarch64 OS_TARGET=linux \
            BINUTILSPREFIX=aarch64-linux-
          make packages_all CPU_TARGET=aarch64 OS_TARGET=linux \
            BINUTILSPREFIX=aarch64-linux-
          make crossinstall CPU_TARGET=aarch64 OS_TARGET=linux \
            INSTALL_PREFIX=$PWD/../fpc-cross

      - name: Build cross-compiler — Windows x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd fpc-source
          make compiler_cycle CPU_TARGET=x86_64 OS_TARGET=win64 || true
          test -f compiler/ppcrossx64 || { echo "ppcrossx64 not built"; exit 1; }
          make rtl_all CPU_TARGET=x86_64 OS_TARGET=win64
          make packages_all CPU_TARGET=x86_64 OS_TARGET=win64
          make crossinstall CPU_TARGET=x86_64 OS_TARGET=win64 \
            INSTALL_PREFIX=$PWD/../fpc-cross

      - name: Build cross-compiler — Windows i386
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd fpc-source
          make compiler_cycle CPU_TARGET=i386 OS_TARGET=win32 || true
          test -f compiler/ppcross386 || { echo "ppcross386 not built"; exit 1; }
          make rtl_all CPU_TARGET=i386 OS_TARGET=win32
          make packages_all CPU_TARGET=i386 OS_TARGET=win32
          make crossinstall CPU_TARGET=i386 OS_TARGET=win32 \
            INSTALL_PREFIX=$PWD/../fpc-cross

      - name: Build cross-compiler — macOS x86_64
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd fpc-source
          make compiler_cycle CPU_TARGET=x86_64 OS_TARGET=darwin || true
          test -f compiler/ppcrossx64 || { echo "ppcrossx64 not built"; exit 1; }
          make rtl_all CPU_TARGET=x86_64 OS_TARGET=darwin
          make packages_all CPU_TARGET=x86_64 OS_TARGET=darwin
          make crossinstall CPU_TARGET=x86_64 OS_TARGET=darwin \
            INSTALL_PREFIX=$PWD/../fpc-cross

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            fpc-cross
            cross-binutils
          key: fpc-cross-${{ env.FPC_VERSION }}-macos-arm64-${{ env.CACHE_VERSION }}
